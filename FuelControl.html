<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelControl — Integrated Operations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#e2e8f0;font-family:'DM Mono','Courier New',monospace;min-height:100vh}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:3px}
input,select,textarea{background:#0d0d0d;color:#e2e8f0;border:1px solid #222;border-radius:4px;padding:8px 12px;font-family:inherit;font-size:12px;width:100%;outline:none;transition:border-color .15s}
input[type="date"],input[type="date"]::-webkit-calendar-picker-indicator{color-scheme:dark;cursor:pointer;filter:invert(0.6)}
input[type="date"]::-webkit-calendar-picker-indicator:hover{filter:invert(1)}
input:focus,select:focus,textarea:focus{border-color:#f59e0b;box-shadow:0 0 0 2px #f59e0b18}
select option{background:#0d0d0d}
button{cursor:pointer;font-family:inherit}
.fade-in{animation:fadeUp .25s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
#topbar{background:#0c0c0c;border-bottom:1px solid #1c1c1c;padding:0 20px;display:flex;align-items:center;justify-content:space-between;gap:12}
#logo-area{display:flex;align-items:center;gap:14;padding:12px 0}
.dot-amber{width:8px;height:8px;border-radius:50%;background:#f59e0b;box-shadow:0 0 10px #f59e0b88;display:inline-block}
.dot-red{width:5px;height:5px;border-radius:50%;background:#ef4444;opacity:.6;display:inline-block}
.logo-text{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:#fff}
#export-btn{background:#0d1f0d;border:1px solid #22c55e;color:#4ade80;padding:7px 16px;border-radius:4px;font-size:10px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:7px;transition:all .2s;white-space:nowrap}
#export-btn:hover{background:#22c55e;color:#000}
.backup-btn{background:#0d1020;border:1px solid #6366f1;color:#818cf8;padding:7px 14px;border-radius:4px;font-size:10px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;cursor:pointer}
.backup-btn:hover{background:#6366f1;color:#fff}
.share-btn{background:#1a0d20;border:1px solid #a855f7;color:#c084fc;padding:7px 14px;border-radius:4px;font-size:10px;letter-spacing:2px;text-transform:uppercase;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;cursor:pointer}
.share-btn:hover{background:#a855f7;color:#fff}
#navbar{background:#0c0c0c;border-bottom:1px solid #1c1c1c;padding:0 20px;display:flex;overflow-x:auto}
.nav-btn{background:none;border:none;padding:11px 14px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;color:#444;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.nav-btn.active{color:#f59e0b;border-bottom-color:#f59e0b}
.nav-btn.highlight{color:#38bdf8;text-shadow:0 0 10px #38bdf888}
.nav-btn.highlight:hover{color:#7dd3fc;text-shadow:0 0 16px #38bdf8cc}
.nav-btn.highlight.active{color:#f59e0b;text-shadow:none;border-bottom-color:#f59e0b}
#content{padding:24px 20px;max-width:1300px;margin:0 auto}
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff;margin-bottom:17px}
.section-title.small{font-size:15px;margin-bottom:11px}
.field-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:5px}
.card{background:#111;border:1px solid #1e1e1e;border-radius:6px}
.kpi-card{background:#111;border:1px solid #1c1c1c;border-radius:6px;padding:15px 16px;cursor:default;transition:border-color .2s}
.kpi-card.clickable{cursor:pointer}
.kpi-card:hover.clickable{border-color:var(--accent)}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:800;color:#fff;line-height:1}
.kpi-label{font-size:9px;letter-spacing:2px;color:#444;text-transform:uppercase;margin-bottom:6px}
.kpi-sub{font-size:9px;color:#333;margin-top:4px}
.btn-primary{background:#f59e0b;color:#000;border:none;padding:12px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-radius:4px;width:100%;transition:all .2s}
.btn-primary:hover{background:#fbbf24}
.btn-primary:disabled{background:#1a1a1a;color:#333;cursor:not-allowed}
.btn-approve{background:#0ea5e9;color:#fff;border:none;padding:5px 12px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;border-radius:3px;font-weight:700}
.badge{display:inline-block;padding:3px 10px;border-radius:3px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;font-weight:700}
.seal-badge{font-size:9px;letter-spacing:1.5px;text-transform:uppercase}
.period-bar{display:flex;gap:2px;background:#111;border:1px solid #1e1e1e;border-radius:6px;padding:3px}
.period-btn{background:none;color:#555;border:none;padding:6px 14px;border-radius:4px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:inherit;font-weight:400;transition:all .2s}
.period-btn.active{background:#f59e0b;color:#000;font-weight:700}
.filter-period-btn{background:none;color:#555;border:none;padding:5px 10px;border-radius:3px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-family:inherit;font-weight:400;transition:all .2s}
.filter-period-btn.active{background:#f59e0b;color:#000;font-weight:700}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:9px 11px;text-align:left;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;white-space:nowrap;font-weight:400}
td{padding:7px 11px}
tr{border-bottom:1px solid #141414}
tr:hover td{background:#141414}
.bar-track{background:#1a1a1a;border-radius:2px;height:3px}
.bar-fill{height:3px;border-radius:2px;transition:width .6s ease}
.bar-fill-2{height:2px;border-radius:2px}
.success-banner{background:#001208;border:1px solid #22c55e;border-radius:5px;padding:13px;margin-bottom:18px;display:flex;align-items:center;gap:12}
.toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:5px;font-size:11px;z-index:9999;box-shadow:0 8px 32px #000a;animation:slideIn .25s ease}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;align-items:start}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:13px;align-items:start}
.empty-state{padding:34px;text-align:center;color:#2a2a2a;font-size:12px;letter-spacing:1px}
.seal-section{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:5px;padding:14px;margin-bottom:13px}
.seal-check-badge{padding:3px 11px;border-radius:3px;font-size:9px;letter-spacing:2px;font-weight:700;text-transform:uppercase}
.last-seals{background:#111;border:1px solid #1e1e1e;border-radius:4px;padding:7px 12px;margin-bottom:11px;font-size:11px;color:#444;display:flex;gap:18px;flex-wrap:wrap}
.total-after-display{background:#0a0a0a;border:1px solid #1e1e1e;border-radius:4px;padding:7px 12px;font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#2a2a2a}
.total-after-display.has-value{color:#f59e0b}
.inv-input{background:#0d0d0d;border:1px solid #1e1e1e;border-radius:3px;color:#f59e0b;text-align:right;width:100px;padding:4px 8px;font-family:inherit;font-size:12px}
tfoot tr{border-top:2px solid #1e1e1e}
.hidden{display:none}
.order-card{background:#111;border:1px solid #1e1e1e;border-radius:5px;padding:13px 17px;display:grid;grid-template-columns:auto 1fr auto;gap:16px;align-items:center;margin-bottom:10px}
.order-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:11px}
.metric-label{font-size:9px;color:#333;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:3px}
.metric-val{font-size:11px;color:#888}
.metric-val.big{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700}
.tab-bar{display:flex;margin-bottom:18px;border-bottom:1px solid #1e1e1e}
.tab-btn{background:none;border:none;padding:9px 14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;color:#444;border-bottom:2px solid transparent;transition:all .2s;font-family:inherit}
.tab-btn.active{color:#f59e0b;border-bottom-color:#f59e0b}
.station-stock-card{background:#111;border:1px solid #1c1c1c;border-radius:5px;padding:11px 14px;margin-bottom:8px}
.stock-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.stock-name{font-size:11px;color:#c0c0c0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;margin-right:10px}
.stock-vals{display:flex;gap:12px;align-items:center;flex-shrink:0}
.stock-disp{font-size:10px;color:#f87171}
.stock-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(148px,1fr));gap:11px;margin-bottom:22px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo-area">
    <div style="display:flex;gap:5px;align-items:center"><span class="dot-amber"></span><span class="dot-red"></span></div>
    <span class="logo-text">FuelControl</span>
    <span style="font-size:9px;letter-spacing:2px;color:#252525;text-transform:uppercase">Integrated Operations</span>
  </div>
  <button class="share-btn" onclick="setView('share')">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    Share Forms
  </button>
  <button class="backup-btn" onclick="saveBackup()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
    Save Backup
  </button>
  <button class="backup-btn" onclick="document.getElementById('restore-input').click()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Load Backup
  </button>
  <input type="file" id="restore-input" accept=".json" style="display:none" onchange="loadBackup(this)">
  <button id="export-btn" onclick="handleExport()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Export Excel
  </button>
</div>

<!-- NAV -->
<div id="navbar">
  <button class="nav-btn active" onclick="setView('dashboard')">Dashboard</button>
  <button class="nav-btn highlight" onclick="setView('refill')">⛽ Fuel Refill</button>
  <button class="nav-btn" onclick="setView('refilllog')">Refill Log</button>
  <button class="nav-btn" onclick="setView('inventory')">Inventory</button>
  <button class="nav-btn" onclick="setView('request')">New Request</button>
  <button class="nav-btn highlight" onclick="setView('orders')">Orders</button>
  <button class="nav-btn" onclick="setView('grn')">Goods Received</button>
  <button class="nav-btn" onclick="setView('trains')">🚂 Trains</button>
  <button class="nav-btn" onclick="setView('fueltypes')">⛽ Fuel Types</button>
  <button class="nav-btn" onclick="setView('stations')">📍 Stations</button>
</div>

<!-- CONTENT -->
<div id="content"></div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────
const DEFAULT_STATIONS = ["Fuel Phnom Penh","Fuel PK12","Fuel DryPort","Fuel SHV","Fuel BTB","Fuel Tela Bat Deung"];
const DEFAULT_FUEL_TYPES = ["Diesel","Petroleum","LPG"];
const DEFAULT_TRAINS = ["DMU 803","KM6868","183-1555","183-9561","183-1503","183-4558","6657","Loco Depot","6640","6575","6535","6428","DMU1035","6375","6561","BB-1011","6343","Bde 411","6663","6633","6546","6675","6697","BB-1012","BB-1060","1038","1035","183-4559","6699","6725","6685"];
const PERIODS = ["Daily","Weekly","Monthly","Yearly"];
const invKey = (s,f) => s+'||'+f;

// State
let state = {
  view: 'dashboard',
  dashPeriod: 'Monthly', dashFrom:'', dashTo:'',
  logPeriod: 'All', logStation: '', logTrain: '', logFuelType:'', logFrom:'', logTo:'',
  ordersTab: 'All',
  invFuelTab: 'Diesel',
  refills: [],
  orders: [],
  inventory: {},
  trains: [...DEFAULT_TRAINS],
  fuelTypes: [...DEFAULT_FUEL_TYPES],
  stations: [...DEFAULT_STATIONS],
  invoicePrefixes: {
    'Fuel Phnom Penh':'L-',
    'Fuel PK12':'PK12-',
    'Fuel SHV':'ST-',
    'Fuel DryPort':'Tela-',
    'Fuel BTB':'B-',
    'Fuel Tela Bat Deung':'Tela-BD-',
  },
  stationMaxLitres: {},
  savedRefill: null,
  savedRequest: false,
  editRefillIdx: null,
  editRefillData: null,
  editOrderIdx: null,
  editOrderData: null,
  editStationIdx: null,
  shareConfig: { apiKey:'', refillBinId:'', requestBinId:'', lastSync:null },
  maintenanceFlags: [],
  showMaintenanceLog: false, // [{id, trainCode, issue, side, detectedAt, refillId, fixed, fixedAt}]
};

// Load from localStorage
try {
  const r = localStorage.getItem('fc_refills'); if(r) state.refills = JSON.parse(r);
  const o = localStorage.getItem('fc_orders'); if(o) state.orders = JSON.parse(o);
  const i = localStorage.getItem('fc_inventory'); if(i) state.inventory = JSON.parse(i);
  const t = localStorage.getItem('fc_trains'); if(t) state.trains = JSON.parse(t);
  const ft = localStorage.getItem('fc_fuelTypes'); if(ft) state.fuelTypes = JSON.parse(ft);
  const st = localStorage.getItem('fc_stations'); if(st) state.stations = JSON.parse(st);
  const ip = localStorage.getItem('fc_invoicePrefixes'); if(ip) state.invoicePrefixes = JSON.parse(ip);
  const ml = localStorage.getItem('fc_stationMaxLitres'); if(ml) state.stationMaxLitres = JSON.parse(ml);
  const sc = localStorage.getItem('fc_shareConfig'); if(sc) state.shareConfig = JSON.parse(sc);
  const mf = localStorage.getItem('fc_maintenanceFlags'); if(mf) state.maintenanceFlags = JSON.parse(mf);
} catch(e) {}

function save() {
  try {
    localStorage.setItem('fc_refills', JSON.stringify(state.refills));
    localStorage.setItem('fc_orders', JSON.stringify(state.orders));
    localStorage.setItem('fc_inventory', JSON.stringify(state.inventory));
    localStorage.setItem('fc_trains', JSON.stringify(state.trains));
    localStorage.setItem('fc_fuelTypes', JSON.stringify(state.fuelTypes));
    localStorage.setItem('fc_stations', JSON.stringify(state.stations));
    localStorage.setItem('fc_invoicePrefixes', JSON.stringify(state.invoicePrefixes));
    localStorage.setItem('fc_stationMaxLitres', JSON.stringify(state.stationMaxLitres));
    localStorage.setItem('fc_shareConfig', JSON.stringify(state.shareConfig));
    localStorage.setItem('fc_maintenanceFlags', JSON.stringify(state.maintenanceFlags));
  } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────
const fmt = n => Number(n||0).toLocaleString();
const today = () => new Date().toISOString().split('T')[0];
const genOrd = () => { const d=new Date(); return `ORD-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}-${String(Math.floor(Math.random()*9000)+1000)}`; };
const genRF = () => `RF-${Date.now()}`;

function dispensedFor(station, fuelType) {
  return state.refills.filter(r=>r.station===station&&r.fuelType===fuelType).reduce((a,r)=>a+Number(r.refillAmt||0),0);
}
function dispensedForStation(station) {
  return state.refills.filter(r=>r.station===station).reduce((a,r)=>a+Number(r.refillAmt||0),0);
}
function getInv(station, fuelType) {
  return state.inventory[invKey(station,fuelType)] || {beginStock:0,received:0};
}
function endingStock(station, fuelType) {
  const inv = getInv(station, fuelType);
  return Number(inv.beginStock)+Number(inv.received)-dispensedFor(station, fuelType);
}
function endingStockStation(station) {
  return state.fuelTypes.reduce((a,f)=>a+endingStock(station,f), 0);
}

function inRange(dateStr, from, to) {
  if(!dateStr) return false;
  if(!from && !to) return true;
  const d = dateStr; // 'YYYY-MM-DD' string comparison works directly
  if(from && to) return d >= from && d <= to;
  if(from) return d >= from;
  if(to) return d <= to;
  return true;
}
function inPeriod(dateStr, period) {
  if(!dateStr || period==='All') return true;
  const d = new Date(dateStr); const ref = new Date();
  if(period==='Daily') return dateStr===ref.toISOString().split('T')[0];
  if(period==='Weekly') { const s=new Date(ref); s.setDate(ref.getDate()-ref.getDay()); s.setHours(0,0,0,0); const e=new Date(s); e.setDate(s.getDate()+6); e.setHours(23,59,59,999); return d>=s&&d<=e; }
  if(period==='Monthly') return d.getFullYear()===ref.getFullYear()&&d.getMonth()===ref.getMonth();
  if(period==='Yearly') return d.getFullYear()===ref.getFullYear();
  return true;
}

function periodLabel(period) {
  const now=new Date();
  if(period==='Daily') return now.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
  if(period==='Weekly') { const s=new Date(now); s.setDate(now.getDate()-now.getDay()); const e=new Date(s); e.setDate(s.getDate()+6); return `${s.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})} – ${e.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}`; }
  if(period==='Monthly') return now.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  if(period==='Yearly') return String(now.getFullYear());
  return '';
}

function sealColor(check) {
  return {PASS:'#4ade80','FIRST FILL':'#7dd3fc',FAIL:'#f87171'}[check]||'#555';
}
function sealBadgeHTML(check) {
  if(!check) return '';
  return `<span class="seal-badge" style="color:${sealColor(check)}">● ${check}</span>`;
}
function statusBadgeHTML(status) {
  const c = {Pending:{bg:'#1a1200',border:'#f59e0b',text:'#fbbf24'},Approved:{bg:'#001020',border:'#38bdf8',text:'#7dd3fc'},Delivered:{bg:'#001508',border:'#22c55e',text:'#4ade80'}}[status]||{bg:'#111',border:'#333',text:'#888'};
  return `<span class="badge" style="background:${c.bg};border:1px solid ${c.border};color:${c.text}">${status}</span>`;
}
function periodBarHTML(active, fn, includeAll=false, fromKey='', toKey='', fromVal='', toVal='', periodKey='') {
  const items = includeAll ? ['All',...PERIODS] : PERIODS;
  const cls = includeAll ? 'filter-period-btn' : 'period-btn';
  const presets = `<div style="${includeAll?'display:flex;gap:2px;background:#111;border:1px solid #1e1e1e;border-radius:5px;padding:2px':''}">
    ${items.map(p=>`<button class="${cls}${active===p?' active':''}" onclick="${fn}('${p}')">${p}</button>`).join('')}
  </div>`;
  if(!fromKey) return presets;
  const dateStyle = 'background:#0d0d0d;color:#e2e8f0;border:1px solid #2a2a2a;border-radius:4px;padding:5px 8px;font-family:inherit;font-size:10px;width:136px;outline:none;cursor:pointer;color-scheme:dark';
  const dateRange = `<div style="display:flex;align-items:center;gap:6px;background:#111;border:1px solid #1e1e1e;border-radius:5px;padding:4px 10px">
    <span style="font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase;white-space:nowrap">From</span>
    <input type="date" value="${fromVal}" style="${dateStyle}" onchange="state.${fromKey}=this.value;state.${periodKey}='Custom';render()">
    <span style="font-size:9px;color:#333">—</span>
    <span style="font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase;white-space:nowrap">To</span>
    <input type="date" value="${toVal}" style="${dateStyle}" onchange="state.${toKey}=this.value;state.${periodKey}='Custom';render()">
    ${(fromVal||toVal)?`<button onclick="state.${fromKey}='';state.${toKey}='';state.${periodKey}='All';render()" style="background:none;border:none;color:#555;font-size:14px;cursor:pointer;padding:0 4px;line-height:1" title="Clear dates">✕</button>`:''}
  </div>`;
  return `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">${presets}${dateRange}</div>`;
}
function fieldHTML(label, inputHTML) {
  return `<div><div class="field-label">${label}</div>${inputHTML}</div>`;
}

function notify(msg, type='ok') {
  const el = document.getElementById('toast');
  el.textContent = (type==='err'?'✕ ':'✓ ') + msg;
  el.style.background = type==='err'?'#1a0000':'#001208';
  el.style.border = `1px solid ${type==='err'?'#ef4444':'#22c55e'}`;
  el.style.color = type==='err'?'#f87171':'#4ade80';
  el.classList.remove('hidden');
  setTimeout(()=>el.classList.add('hidden'), 3500);
}

// ── Router ────────────────────────────────────────────────────────────────
function setView(v) {
  state.view = v;
  state.editRefillIdx = null; state.editRefillData = null;
  state.editOrderIdx = null; state.editOrderData = null;
  state.editStationIdx = null;
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    const views=['dashboard','refill','refilllog','inventory','request','orders','grn','trains','fueltypes','stations','share'];
    b.classList.toggle('active', views[i]===v);
  });
  render();
}

function render() {
  const el = document.getElementById('content');
  el.className = 'fade-in';
  el.innerHTML = '';
  const views = {
    dashboard: renderDashboard,
    refill: renderRefill,
    refilllog: renderRefillLog,
    inventory: renderInventory,
    request: renderRequest,
    orders: renderOrders,
    grn: renderGRN,
    trains: renderTrains,
    fueltypes: renderFuelTypes,
    stations: renderStations,
    share: renderShare,
  };
  el.innerHTML = (views[state.view]||renderDashboard)();
  // Void el to force reflow for animation
  el.offsetHeight;
  attachHandlers();
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function renderDashboard() {
  const p = state.dashPeriod;
  const fRef = state.refills.filter(r=> p==='Custom' ? inRange(r.date,state.dashFrom,state.dashTo) : inPeriod(r.date,p));
  const fOrd = state.orders.filter(o=> p==='Custom' ? inRange(o.requestDate,state.dashFrom,state.dashTo) : inPeriod(o.requestDate,p));
  const pDisp = fRef.reduce((a,r)=>a+Number(r.refillAmt||0),0);
  const totalEnd = state.stations.reduce((a,s)=>a+endingStockStation(s),0);
  const sealFails = fRef.filter(r=>r.sealCheck==='FAIL').length;

  // Train usage
  const tmap = {};
  fRef.forEach(r=>{ tmap[r.trainCode]=(tmap[r.trainCode]||0)+Number(r.refillAmt||0); });
  const trainUsage = Object.entries(tmap).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Station dispensed
  const stUsage = state.stations.map(s=>({s,d:fRef.filter(r=>r.station===s).reduce((a,r)=>a+Number(r.refillAmt||0),0),c:fRef.filter(r=>r.station===s).length})).filter(x=>x.d>0).sort((a,b)=>b.d-a.d);

  const openMaintenance = state.maintenanceFlags.filter(m=>!m.fixed).length;
  const kpis = [
    {l:'Fleet Stock',v:`${fmt(totalEnd)} L`,a:'#f59e0b',s:'current total'},
    {l:'Fuel Dispensed',v:`${fmt(pDisp)} L`,a:'#ef4444',s:`${fRef.length} refill${fRef.length!==1?'s':''}`},
    {l:'Seal Failures',v:sealFails,a:sealFails>0?'#ef4444':'#22c55e',s:sealFails===0?'all clear':'this period'},
    {l:'Maintenance',v:openMaintenance,a:openMaintenance>0?'#fb923c':'#22c55e',s:openMaintenance===0?'all clear':'trains need fix'},
    {l:'Pending',v:fOrd.filter(o=>o.status==='Pending').length,a:'#f59e0b',fn:"setView('orders')"},
    {l:'Approved',v:fOrd.filter(o=>o.status==='Approved').length,a:'#38bdf8',fn:"setView('orders')"},
    {l:'Delivered',v:fOrd.filter(o=>o.status==='Delivered').length,a:'#22c55e',fn:"setView('orders')"},
  ];

  const recentRows = [...fRef].reverse().slice(0,10).map(r=>`
    <tr>
      <td style="color:#555">${r.date}</td>
      <td style="color:#f59e0b;font-weight:600">${r.trainCode}</td>
      <td style="color:#7dd3fc;font-size:10px">${r.station}</td>
      <td style="color:#888">${r.operator}</td>
      <td style="font-weight:700;color:#ef4444;font-family:'Barlow Condensed',sans-serif;font-size:15px">${fmt(r.refillAmt)}</td>
      <td>${sealBadgeHTML(r.sealCheck)}</td>
    </tr>`).join('');

  const trainRows = trainUsage.length===0
    ? `<div class="empty-state">No refill data this ${p.toLowerCase()}</div>`
    : trainUsage.map(([t,l],i)=>{
      const mx=trainUsage[0][1];
      return `<div style="padding:9px 14px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:11px">
        <div style="width:16px;font-size:9px;color:#2a2a2a;flex-shrink:0">${i+1}</div>
        <div style="flex:1;min-width:0"><div style="font-size:11px;color:#c0c0c0;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t}</div>
        <div class="bar-track"><div class="bar-fill-2" style="width:${(l/mx)*100}%;background:#f59e0b"></div></div></div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;color:#f59e0b;flex-shrink:0">${fmt(l)}<span style="font-size:9px;color:#333;font-weight:400"> L</span></div>
      </div>`;
    }).join('');

  const stRows = stUsage.map(({s,d,c})=>{
    const mx=stUsage[0].d;
    return `<div style="padding:9px 14px;border-bottom:1px solid #141414;display:flex;align-items:center;gap:11px">
      <div style="flex:1;min-width:0"><div style="font-size:10px;color:#888;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s}</div>
      <div class="bar-track"><div class="bar-fill-2" style="width:${(d/mx)*100}%;background:#ef4444"></div></div></div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:#ef4444">${fmt(d)}<span style="font-size:9px;color:#333"> L</span></div>
        <div style="font-size:9px;color:#333">${c} refill${c!==1?'s':''}</div>
      </div></div>`;
  }).join('');

  const stationCards = state.stations.map(s=>{
    const e=endingStockStation(s);
    const maxL = state.stationMaxLitres[s] || 0;
    const cap = maxL > 0 ? maxL : Math.max(state.fuelTypes.reduce((a,f)=>{const inv=getInv(s,f);return a+Number(inv.beginStock)+Number(inv.received);},0), 1);
    const pct=Math.min(100,Math.max(0,(e/cap)*100));
    const c=pct>40?'#22c55e':pct>15?'#f59e0b':'#ef4444';
    const pd=fRef.filter(r=>r.station===s).reduce((a,r)=>a+Number(r.refillAmt||0),0);
    const refillCount = fRef.filter(r=>r.station===s).length;
    const orderCount = state.orders.filter(o=>o.station===s).length;
    return {s,e,maxL,pct,c,pd,refillCount,orderCount};
  }).sort((a,b)=>b.pd-a.pd).map(({s,e,maxL,pct,c,pd,refillCount,orderCount})=>
    `<div class="station-stock-card">
      <div class="stock-row">
        <div class="stock-name">${s}</div>
        <div class="stock-vals">
          ${pd>0?`<div class="stock-disp">-${fmt(pd)}L</div>`:''}
          <div style="text-align:right">
            <div class="stock-val" style="color:${c}">${fmt(e)}<span style="font-size:9px;color:#333;font-weight:400"> L</span>${maxL>0?`<span style="font-size:9px;color:#2a2a2a"> / ${fmt(maxL)}L</span>`:''}</div>
            ${maxL>0?`<div style="font-size:11px;font-weight:700;color:${c};font-family:'Barlow Condensed',sans-serif;letter-spacing:1px">${pct.toFixed(1)}%</div>`:''}
          </div>
        </div>
      </div>
      <div class="bar-track" style="height:5px;margin-top:6px"><div class="bar-fill" style="height:5px;width:${pct}%;background:${c}"></div></div>
      <div style="display:flex;gap:14px;margin-top:7px;padding-top:7px;border-top:1px solid #161616">
        <div style="font-size:10px;color:#444">Refills: <span style="color:#888;font-weight:600">${refillCount}</span></div>
        <div style="font-size:10px;color:#444">Orders: <span style="color:#888;font-weight:600">${orderCount}</span></div>
      </div>
    </div>`
  ).join('');

  // Seal failure alerts — all FAIL records with mismatch details
  const sealFailRecords = state.refills.filter(r=>r.sealCheck==='FAIL');
  let sealAlertsHTML = '';
  if(sealFailRecords.length>0){
    const sealRows = [...sealFailRecords].reverse().map(r=>{
      // Find the previous record for this train to show what was expected
      const idx = state.refills.indexOf(r);
      const prev = state.refills.slice(0,idx).filter(x=>x.trainCode===r.trainCode).slice(-1)[0];
      const leftMatch = prev && r.oldSealLeft===prev.newSealLeft;
      const rightMatch = prev && r.oldSealRight===prev.newSealRight;
      return `<div style="padding:10px 16px;border-bottom:1px solid #161616">
        <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:7px">
          <div style="font-size:9px;color:#333;flex-shrink:0">${r.date}</div>
          <div style="color:#f59e0b;font-weight:600;font-size:12px">${r.trainCode}</div>
          <div style="color:#666;font-size:10px">${r.station}</div>
          <div style="color:#888;font-size:10px">${r.operator}</div>
        </div>
        <div style="display:flex;gap:18px;flex-wrap:wrap">
          <div style="background:#0d0d0d;border:1px solid ${leftMatch?'#22c55e':'#ef4444'};border-radius:3px;padding:5px 11px">
            <div style="font-size:8px;letter-spacing:1.5px;color:#444;text-transform:uppercase;margin-bottom:3px">Seal Left</div>
            <div style="display:flex;gap:10px;align-items:center">
              <div style="font-size:10px;color:#555">Expected: <span style="color:#c0c0c0">${prev?prev.newSealLeft:'—'}</span></div>
              <div style="font-size:10px;color:#555">Got: <span style="color:${leftMatch?'#4ade80':'#f87171'};font-weight:600">${r.oldSealLeft}</span></div>
              <div style="font-size:9px;font-weight:700;color:${leftMatch?'#4ade80':'#f87171'}">${leftMatch?'✓':'✗'}</div>
            </div>
          </div>
          <div style="background:#0d0d0d;border:1px solid ${rightMatch?'#22c55e':'#ef4444'};border-radius:3px;padding:5px 11px">
            <div style="font-size:8px;letter-spacing:1.5px;color:#444;text-transform:uppercase;margin-bottom:3px">Seal Right</div>
            <div style="display:flex;gap:10px;align-items:center">
              <div style="font-size:10px;color:#555">Expected: <span style="color:#c0c0c0">${prev?prev.newSealRight:'—'}</span></div>
              <div style="font-size:10px;color:#555">Got: <span style="color:${rightMatch?'#4ade80':'#f87171'};font-weight:600">${r.oldSealRight}</span></div>
              <div style="font-size:9px;font-weight:700;color:${rightMatch?'#4ade80':'#f87171'}">${rightMatch?'✓':'✗'}</div>
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
    sealAlertsHTML = `<div style="margin-bottom:20px">
      <div class="section-title small" style="color:#f87171;display:flex;align-items:center;gap:8px">
        <span style="background:#ef4444;color:#000;padding:1px 7px;border-radius:3px;font-size:11px">${sealFailRecords.length}</span>
        Seal Mismatch Alerts — All Time
      </div>
      <div style="background:#111;border:1px solid #2a1010;border-left:3px solid #ef4444;border-radius:5px;overflow:hidden">${sealRows}</div>
    </div>`;
  }

  // Meter mismatch alerts
  const meterMismatches = state.refills.filter(r=>r.meterMismatch);
  let meterAlertsHTML = '';
  if(meterMismatches.length>0){
    const meterRows = meterMismatches.map(r=>{
      const diff = Number(r.refillAmt) - Number(r.meterDiff||0);
      const sign = diff>0?'+':'';
      const color = '#f59e0b';
      return `<div style="display:flex;align-items:center;gap:16px;padding:10px 16px;border-bottom:1px solid #161616;flex-wrap:wrap">
        <div style="font-size:9px;color:#333;flex-shrink:0">${r.date}</div>
        <div style="color:#f59e0b;font-weight:600;font-size:12px;flex-shrink:0">${r.trainCode}</div>
        <div style="color:#888;font-size:11px;flex:1;min-width:100px">${r.station}</div>
        <div style="display:flex;gap:14px;align-items:center;flex-shrink:0;flex-wrap:wrap">
          <div style="font-size:11px;color:#555">Meter: <span style="color:#c0c0c0">${fmt(r.meterDiff||0)} L</span></div>
          <div style="font-size:11px;color:#555">Refill: <span style="color:#c0c0c0">${fmt(r.refillAmt)} L</span></div>
          <div style="background:#1a0800;border:1px solid ${color};color:${color};padding:2px 10px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap">${sign}${fmt(diff)} L</div>
          <div style="font-size:10px;color:#555">by ${r.operator||'—'}</div>
        </div>
      </div>`;
    }).join('');
    meterAlertsHTML = `<div style="margin-bottom:20px">
      <div class="section-title small" style="color:#f59e0b;display:flex;align-items:center;gap:8px">
        <span style="background:#f59e0b;color:#000;padding:1px 7px;border-radius:3px;font-size:11px">${meterMismatches.length}</span>
        Meter vs Refill Mismatches — All Time
      </div>
      <div style="background:#111;border:1px solid #2a1500;border-left:3px solid #f59e0b;border-radius:5px;overflow:hidden">${meterRows}</div>
    </div>`;
  }

  // Delivery variance alerts
  const deliveredWithVariance = state.orders.filter(o=>o.status==='Delivered'&&o.deliveredQty!=null&&Number(o.deliveredQty)!==Number(o.quantity));
  let deliveryAlertsHTML = '';
  if(deliveredWithVariance.length>0){
    const alertRows=deliveredWithVariance.map(o=>{
      const ordered=Number(o.quantity),delivered=Number(o.deliveredQty),diff=delivered-ordered;
      const pct=((Math.abs(diff)/ordered)*100).toFixed(1),sign=diff>0?'+':'';
      const color=diff<0?'#f87171':'#4ade80',bg=diff<0?'#1a0000':'#001208';
      return `<div style="display:flex;align-items:center;gap:16px;padding:10px 16px;border-bottom:1px solid #161616;flex-wrap:wrap">
        <div style="font-size:9px;color:#333;flex-shrink:0">${o.deliveredDate||o.requestDate}</div>
        <div style="color:#f59e0b;font-weight:600;font-size:12px;flex-shrink:0">${o.orderNo}</div>
        <div style="color:#888;font-size:11px;flex:1;min-width:100px">${o.station}</div>
        <div style="display:flex;gap:14px;align-items:center;flex-shrink:0;flex-wrap:wrap">
          <div style="font-size:11px;color:#555">Ordered: <span style="color:#c0c0c0">${fmt(ordered)} L</span></div>
          <div style="font-size:11px;color:#555">Delivered: <span style="color:${color}">${fmt(delivered)} L</span></div>
          <div style="background:${bg};border:1px solid ${color};color:${color};padding:2px 10px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap">${sign}${fmt(diff)} L &nbsp;${sign}${pct}%</div>
        </div>
      </div>`;
    }).join('');
    deliveryAlertsHTML=`<div style="margin-bottom:20px">
      <div class="section-title small" style="color:#f87171;display:flex;align-items:center;gap:8px">
        <span style="background:#ef4444;color:#000;padding:1px 7px;border-radius:3px;font-size:11px">${deliveredWithVariance.length}</span>
        Delivery Quantity Variances
      </div>
      <div style="background:#111;border:1px solid #2a1010;border-left:3px solid #ef4444;border-radius:5px;overflow:hidden">${alertRows}</div>
    </div>`;
  }

  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#fff">Dashboard</div>
        <div style="font-size:10px;color:#444;letter-spacing:1px;margin-top:2px">${p==='Custom'?(state.dashFrom||'?')+' — '+(state.dashTo||'?'):periodLabel(p)}</div>
      </div>
      ${periodBarHTML(p,'setDashPeriod',false,'dashFrom','dashTo',state.dashFrom||'',state.dashTo||'','dashPeriod')}
    </div>

    <div class="kpi-grid">
      ${kpis.map(({l,v,a,s,fn})=>`
        <div class="kpi-card${fn?' clickable':''}" style="border-top:2px solid ${a}" ${fn?`onclick="${fn}"`:''}
          onmouseenter="${fn?`this.style.borderColor='${a}'`:''}"
          onmouseleave="this.style.borderColor='#1c1c1c';this.style.borderTopColor='${a}'">
          <div class="kpi-label">${l}</div>
          <div class="kpi-val">${v}</div>
          ${s?`<div class="kpi-sub">${s}</div>`:''}
        </div>`).join('')}
    </div>

    <div class="grid-2" style="margin-bottom:20px">
      <div>
        <div class="section-title small">Station Stock — Current</div>
        ${stationCards}
      </div>
      <div style="display:flex;flex-direction:column;gap:16px">
        <div>
          <div class="section-title small">Top Train Consumers — ${p}</div>
          <div class="card">${trainRows}</div>
        </div>
        ${stUsage.length>0?`<div>
          <div class="section-title small">Station Dispensed — ${p}</div>
          <div class="card">${stRows}</div>
        </div>`:''}
      </div>
    </div>

    ${meterAlertsHTML}

    ${sealAlertsHTML}

    ${deliveryAlertsHTML}

    ${(()=>{
      const openFlags  = state.maintenanceFlags.filter(m=>!m.fixed);
      const fixedFlags = state.maintenanceFlags.filter(m=>m.fixed);
      if(!state.maintenanceFlags.length) return '';
      const issueLabel = m => m.issue==='NO_SEAL' ? 'No Seal' : 'No Gas Cap';
      const issueBadge = m => `<span style="background:${m.issue==='NO_SEAL'?'#1a0000':'#1a0800'};border:1px solid ${m.issue==='NO_SEAL'?'#ef4444':'#f97316'};color:${m.issue==='NO_SEAL'?'#f87171':'#fb923c'};padding:2px 8px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:1px">${issueLabel(m)}</span>`;
      const openRows = openFlags.map(m=>`
        <tr>
          <td style="color:#f59e0b;font-weight:700">${m.trainCode}</td>
          <td>${issueBadge(m)}</td>
          <td style="color:#666">${m.side}</td>
          <td style="color:#555">${m.detectedAt}</td>
          <td style="color:#333">—</td>
          <td>
            <button onclick="markMaintenanceFixed('${m.id}')" style="background:#001208;border:1px solid #22c55e;color:#4ade80;padding:3px 10px;border-radius:3px;font-size:9px;cursor:pointer;font-weight:700" onmouseover="this.style.background='#22c55e';this.style.color='#000'" onmouseout="this.style.background='#001208';this.style.color='#4ade80'">✓ Mark Fixed</button>
          </td>
        </tr>`).join('');
      const fixedRows = fixedFlags.map(m=>`
        <tr style="opacity:.5">
          <td style="color:#f59e0b;font-weight:700">${m.trainCode}</td>
          <td>${issueBadge(m)}</td>
          <td style="color:#666">${m.side}</td>
          <td style="color:#555">${m.detectedAt}</td>
          <td style="color:#4ade80">${m.fixedAt||'—'}</td>
          <td><span style="font-size:9px;color:#4ade80;font-weight:700;letter-spacing:1px">✓ FIXED</span></td>
        </tr>`).join('');
      const showLog = state.showMaintenanceLog;
      return `<div style="margin-bottom:20px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
          <div class="section-title small" style="color:#fb923c;display:flex;align-items:center;gap:8px;margin:0">
            🔧 Trains Needing Maintenance
            ${openFlags.length?`<span style="background:#fb923c;color:#000;font-size:9px;font-weight:800;padding:1px 7px;border-radius:10px">${openFlags.length}</span>`:''}
          </div>
          ${fixedFlags.length?`<button onclick="state.showMaintenanceLog=!state.showMaintenanceLog;render()" style="background:none;border:1px solid #1e1e1e;color:#444;padding:4px 12px;border-radius:3px;font-size:9px;cursor:pointer;letter-spacing:1px" onmouseover="this.style.borderColor='#555';this.style.color='#888'" onmouseout="this.style.borderColor='#1e1e1e';this.style.color='#444'">
            ${showLog?'▲ Hide Log':'▼ Show Log'} (${fixedFlags.length} fixed)
          </button>`:''}
        </div>
        <div class="card" style="overflow:auto">
          ${!openFlags.length&&!showLog
            ? `<div style="padding:12px;font-size:11px;color:#2a2a2a;text-align:center">✓ No open maintenance issues</div>`
            : `<table>
                <thead><tr>${['Train','Issue','Side','Detected','Fixed','Action'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
                <tbody>
                  ${openRows}
                  ${showLog ? fixedRows : ''}
                </tbody>
              </table>`}
        </div>
      </div>`;
    })()}

    <div class="section-title small">Recent Refills — ${p}</div>
    <div class="card" style="overflow:auto">
      ${fRef.length===0?`<div class="empty-state">No refills this ${p.toLowerCase()}</div>`:`
        <table>
          <thead><tr>${['Date','Train','Station','Operator','Refill (L)','Seal'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>${recentRows}</tbody>
        </table>`}
    </div>`;
}

function setDashPeriod(p) { state.dashPeriod=p; if(p!=='Custom'){state.dashFrom='';state.dashTo='';} render(); }

// ── Refill Form ───────────────────────────────────────────────────────────
function renderRefill() {
  const s = state.refillForm || {date:today(),trainCode:'',station:'',fuelType:'',invoiceNo:'',startOdo:'',endOdo:'',operator:'',fuelRemaining:'',refillAmt:'',oldSealLeft:'',oldSealRight:'',newSealLeft:'',newSealRight:''};
  const totalAfter = (Number(s.fuelRemaining)||0)+(Number(s.refillAmt)||0);

  let lastRecord = null;
  if(s.trainCode) { const m=state.refills.filter(r=>r.trainCode===s.trainCode); lastRecord=m.length?m[m.length-1]:null; }

  // Last refill at this station — for meter start hint
  let lastStationRecord = null;
  if(s.station) { const m=state.refills.filter(r=>r.station===s.station && r.endOdo); lastStationRecord=m.length?m[m.length-1]:null; }
  const lastMeter = lastStationRecord ? Number(lastStationRecord.endOdo) : null;

  let sealCheck = '';
  if(s.trainCode) {
    if(!lastRecord) {
      sealCheck = (s.oldSealLeft || s.oldSealRight) ? 'FIRST FILL' : '';
    } else if(s.oldSealLeft && s.oldSealRight) {
      sealCheck = (s.oldSealLeft===lastRecord.newSealLeft && s.oldSealRight===lastRecord.newSealRight) ? 'PASS' : 'FAIL';
    }
  }
  const sc = sealColor(sealCheck);

  const savedBanner = state.savedRefill ? `
    <div class="success-banner">
      <span style="color:#4ade80;font-size:16px">✓</span>

      </div></div>` : '';

  const oldLWarn = s.oldSealLeft&&lastRecord&&s.oldSealLeft!==lastRecord.newSealLeft;
  const oldRWarn = s.oldSealRight&&lastRecord&&s.oldSealRight!==lastRecord.newSealRight;

  // Open maintenance flags for selected train
  const trainMaintFlags = s.trainCode ? state.maintenanceFlags.filter(m=>m.trainCode===s.trainCode&&!m.fixed) : [];
  const maintBanner = trainMaintFlags.length ? `
    <div style="background:#1a1100;border:1px solid #f59e0b;border-radius:5px;padding:11px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 0 16px #f59e0b44">
      <span style="font-size:18px;line-height:1">⚠</span>
      <div>
        <div style="color:#f59e0b;font-weight:700;font-size:11px;letter-spacing:1px;margin-bottom:5px">MAINTENANCE REQUIRED — ${s.trainCode}</div>
        ${trainMaintFlags.map(m=>`<div style="font-size:11px;color:#fbbf24;margin-bottom:2px">• ${m.side} side: <span style="font-weight:700">${m.issue==='NO_SEAL'?'No Seal':'No Gas Tank Cap'}</span> <span style="color:#555;font-size:10px">(since ${m.detectedAt})</span></div>`).join('')}
        <div style="font-size:10px;color:#444;margin-top:5px">Seal fields auto-filled. Go to Dashboard → Mark Fixed once repaired.</div>
      </div>
    </div>` : '';

  return `

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start">

              ${fieldHTML('Date *',`<input type="date" id="rf-date" value="${s.date}" onchange="rfChange('date',this.value)">`)}
              ${fieldHTML('Train Code *',`
                <div style="position:relative" id="rf-train-wrap">
                  <input type="text" id="rf-train-input"
                    value="${s.trainCode}"
                    placeholder="Type to search…"
                    autocomplete="off"

                    onfocus="rfTrainSearch(this.value)"

                    <span>Meter: <span style="color:#c0c0c0">${fmt(meterDiff)} L</span></span>

              ${fieldHTML('Fuel Type *',`<select id="rf-fueltype" onchange="rfChange('fuelType',this.value)"><option value="">Select…</option>${state.fuelTypes.map(f=>`<option value="${f}"${s.fuelType===f?' selected':''}>${f}</option>`).join('')}</select>`)}

              ${fieldHTML('Refill Amount (L) *',`<input type="number" id="rf-amt" value="${s.refillAmt}" min="1" oninput="rfSilent('refillAmt',this.value);rfUpdateTotal();rfUpdateMeter()">`)}
            </div>

              ${fieldHTML('Train Tank Total After',`<div id="rf-total" class="total-after-display${totalAfter?' has-value':''}">${totalAfter||'—'}<span style="font-size:11px;color:#333;font-weight:400"> L</span></div>`)}
            </div>

          </div>

          <!-- RIGHT COLUMN: seal codes -->
          <div class="seal-section" style="margin:0">

            </div>
            ${lastRecord?`<div class="last-seals"><span>Last seals:</span><span>Left: <span style="color:#c0c0c0">${lastRecord.newSealLeft||'—'}</span></span><span>Right: <span style="color:#c0c0c0">${lastRecord.newSealRight||'—'}</span></span></div>`:''}

            ${['Left','Right'].map(side=>{
              const fk = `oldSeal${side}`;
              const id = `rf-os${side==='Left'?'l':'r'}`;
              const warnId = `rf-os${side==='Left'?'l':'r'}-warn`;

              const lastVal = lastRecord ? lastRecord[`newSeal${side}`] : '';
              const isNoSeal = val==='NO_SEAL';

                  style="flex:1;padding:5px 4px;font-size:9px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;border-radius:3px;cursor:pointer;transition:all .15s;

              return `<div style="margin-bottom:12px">
                <div class="field-label" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">

                  <span id="${warnId}" style="color:#f87171;font-size:9px;letter-spacing:1px;font-weight:700">${isMismatch?'⚠ MISMATCH':''}</span>

                  ${optBtn('Type','TYPE','#888', !isSpecial && val && !(lastVal&&val===lastVal))}

                  ${optBtn('No Seal','NO_SEAL','#f87171', isNoSeal)}
                  ${optBtn('No Cap','NO_CAP','#fb923c', isNoCap)}
                </div>
                ${isSpecial
                  ? `<div style="background:${isNoSeal?'#1a0000':'#1a0800'};border:1px solid ${isNoSeal?'#ef4444':'#f97316'};border-radius:4px;padding:7px 10px;font-size:10px;color:${isNoSeal?'#f87171':'#fb923c'};font-weight:600">
                      ⚠ ${isNoSeal?'No seal fitted':'No gas tank cap'} — will be flagged for maintenance
                    </div>`
                  : `<input type="text" id="${id}" value="${isSpecial?'':val}" placeholder="Enter code"
                      oninput="rfSilent('${fk}',this.value);rfUpdateSeal()"
                      style="${isMismatch?'border-color:#ef4444':''}">`
                }
              </div>`;
            }).join('')}

            <div class="grid-2">
              ${['Left','Right'].map(side => {
                const oldVal = s[`oldSeal${side}`]||'';
                const isSpecial = oldVal==='NO_SEAL'||oldVal==='NO_CAP';
                const nfk = `newSeal${side}`;
                const nid = `rf-ns${side==='Left'?'l':'r'}`;
                return isSpecial
                  ? fieldHTML(`New Seal ${side} *`, `<div style="background:#111;border:1px solid #1e1e1e;border-radius:4px;padding:8px 12px;font-size:11px;color:#333">N/A — ${oldVal==='NO_SEAL'?'No seal':'No cap'}</div>`)
                  : fieldHTML(`New Seal ${side} *`, `<input type="text" id="${nid}" value="${s[nfk]||''}" placeholder="Code" oninput="rfSilent('${nfk}',this.value)">`);
              }).join('')}
            </div>
          </div>

        </div>
      </div>
    </div>`;
}

// Silent update — saves to state without re-rendering (preserves typing)
// ── Train Code searchable combobox ────────────────────────────────────────
let _rfTrainIdx = -1;
function rfTrainSearch(q) {
  const drop = document.getElementById('rf-train-drop');
  if(!drop) return;
  const query = q.trim().toLowerCase();
  const matches = query
    ? state.trains.filter(t => t.toLowerCase().includes(query))
    : state.trains;
  if(!matches.length) { drop.style.display='none'; return; }
  _rfTrainIdx = -1;
  drop.innerHTML = matches.map((t,i) => {
    const hasMaint = state.maintenanceFlags.some(m=>m.trainCode===t&&!m.fixed);
    const label = t.toLowerCase().includes(query) && query
      ? t.replace(new RegExp(`(${query})`, 'gi'), '<span style="color:#f59e0b;font-weight:700">$1</span>')
      : t;
    return `<div data-val="${t}" data-i="${i}"
      onmousedown="rfTrainPick('${t}')"
      onmouseover="rfTrainHover(${i})"
      style="padding:8px 12px;font-size:11px;cursor:pointer;color:${hasMaint?'#fbbf24':'#c0c0c0'};border-bottom:1px solid #111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;${hasMaint?'background:#0d0900;':''}">
      ${hasMaint?'⚠ ':''}${label}${hasMaint?'<span style="font-size:9px;color:#f59e0b;margin-left:6px;letter-spacing:1px">NEEDS FIX</span>':''}
    </div>`;
  }).join('');
  drop.style.display = 'block';
}
function rfTrainHover(i) {
  _rfTrainIdx = i;
  [...document.querySelectorAll('#rf-train-drop [data-i]')].forEach((el,j) => {
    el.style.background = j===i ? '#1a1a0a' : '';
    el.style.color = j===i ? '#f59e0b' : '#c0c0c0';
  });
}
function rfTrainPick(val) {
  const inp = document.getElementById('rf-train-input');
  if(inp) inp.value = val;
  rfChange('trainCode', val);
  rfTrainHide();
}
function rfTrainHide() {
  const drop = document.getElementById('rf-train-drop');
  if(drop) drop.style.display = 'none';
}
function rfTrainKey(e) {
  const drop = document.getElementById('rf-train-drop');
  if(!drop || drop.style.display==='none') {
    if(e.key==='ArrowDown'||e.key==='Enter') rfTrainSearch(e.target.value);
    return;
  }
  const items = [...drop.querySelectorAll('[data-i]')];
  if(!items.length) return;
  if(e.key==='ArrowDown') { e.preventDefault(); rfTrainHover(Math.min(_rfTrainIdx+1, items.length-1)); }
  else if(e.key==='ArrowUp') { e.preventDefault(); rfTrainHover(Math.max(_rfTrainIdx-1, 0)); }
  else if(e.key==='Enter') { e.preventDefault(); if(_rfTrainIdx>=0) rfTrainPick(items[_rfTrainIdx].dataset.val); }
  else if(e.key==='Escape') rfTrainHide();
}

function rfSilent(k,v) {
  if(!state.refillForm) state.refillForm = {date:today(),trainCode:'',station:'',fuelType:'',invoiceNo:'',startOdo:'',endOdo:'',operator:'',fuelRemaining:'',refillAmt:'',oldSealLeft:'',oldSealRight:'',newSealLeft:'',newSealRight:''};
  state.refillForm[k] = v;
}


function rfInvoiceInput(v){
  const f = state.refillForm||{};
  const prefix = state.invoicePrefixes[f.station] || '';
  rfSilent('invoiceNo', prefix + v);
}

// Full re-render only for dropdowns/date that affect layout (seal lookup, etc.)
function rfChange(k,v) {
  rfSilent(k,v);
  if(k==='station') rfSilent('invoiceNo','');
  if(k==='trainCode') {
    // Auto-fill old seal fields based on open maintenance flags for this train
    const openFlags = state.maintenanceFlags.filter(m=>m.trainCode===v && !m.fixed);
    ['Left','Right'].forEach(side => {
      const flag = openFlags.find(m=>m.side===side);
      if(flag) {
        rfSilent(`oldSeal${side}`, flag.issue);
        rfSilent(`newSeal${side}`, flag.issue);
      }
    });
  }
  render();
}

// Update total-after display inline
function rfUpdateTotal() {
  const f = state.refillForm || {};
  const t = (Number(f.fuelRemaining)||0)+(Number(f.refillAmt)||0);
  const el = document.getElementById('rf-total');
  if(!el) return;
  el.innerHTML = (t||'—') + '<span style="font-size:11px;color:#333;font-weight:400"> L</span>';
  el.className = 'total-after-display' + (t?' has-value':'');
  rfUpdateMeter();
}

function rfUpdateMeter() {
  const f = state.refillForm || {};
  const start = Number(f.startOdo)||0;
  const end = Number(f.endOdo)||0;
  const refill = Number(f.refillAmt)||0;
  const el = document.getElementById('rf-meter-warn');
  if(!el) return;
  if(!start || !end || !refill) { el.innerHTML=''; return; }
  const meterDiff = end - start;
  if(meterDiff === refill) {
    el.innerHTML = `<div style="background:#001208;border:1px solid #22c55e;border-radius:4px;padding:7px 14px;font-size:11px;color:#4ade80">✓ Meter reading matches refill amount (${fmt(refill)} L)</div>`;
  } else {
    const diff = refill - meterDiff;
    el.innerHTML = `<div style="background:#1a0800;border:1px solid #f59e0b;border-radius:4px;padding:9px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
      <div style="font-size:11px;color:#fbbf24;font-weight:600">⚠ Meter vs Refill mismatch — will be flagged on Dashboard</div>
      <div style="display:flex;gap:14px;font-size:10px;color:#666">
        <span>Meter reading: <span style="color:#c0c0c0">${fmt(meterDiff)} L</span></span>
        <span>Refill entered: <span style="color:#c0c0c0">${fmt(refill)} L</span></span>
        <span style="color:${diff>0?'#f87171':'#4ade80'};font-weight:700">${diff>0?'+':''}${fmt(diff)} L</span>
      </div>
    </div>`;
  }
}

// Update seal check badge inline
function rfUpdateSeal() {
  const f = state.refillForm || {};
  if(!f.trainCode) return;
  const lastRecord = state.refills.filter(r=>r.trainCode===f.trainCode).slice(-1)[0];
  const el = document.getElementById('rf-sealcheck');

  // Only show result when both old seals have been entered
  if(!f.oldSealLeft && !f.oldSealRight) {
    if(el) el.innerHTML = '';
    const warnL = document.getElementById('rf-osl-warn');
    const warnR = document.getElementById('rf-osr-warn');
    if(warnL) warnL.textContent = '';
    if(warnR) warnR.textContent = '';
    return;
  }

  let sealCheck;
  if(!lastRecord) {
    sealCheck = 'FIRST FILL';
  } else {
    const leftOk  = !f.oldSealLeft  || f.oldSealLeft  === lastRecord.newSealLeft;
    const rightOk = !f.oldSealRight || f.oldSealRight === lastRecord.newSealRight;
    // Only show PASS when both fields are filled and match
    if(f.oldSealLeft && f.oldSealRight) {
      sealCheck = (f.oldSealLeft===lastRecord.newSealLeft && f.oldSealRight===lastRecord.newSealRight) ? 'PASS' : 'FAIL';
    } else {
      // Partial — show mismatch warning on whichever is filled but don't show badge yet
      sealCheck = '';
    }
  }

  const sc = sealColor(sealCheck);
  if(el) {
    el.innerHTML = sealCheck
      ? `<div class="seal-check-badge" style="background:${sealCheck==='PASS'?'#001208':sealCheck==='FIRST FILL'?'#001020':'#1a0000'};border:1px solid ${sc};color:${sc}">${sealCheck}</div>`
      : '';
  }

  // Inline mismatch warnings — show as soon as a field has a value and it doesn't match
  const leftMismatch  = f.oldSealLeft  && lastRecord && f.oldSealLeft  !== lastRecord.newSealLeft;
  const rightMismatch = f.oldSealRight && lastRecord && f.oldSealRight !== lastRecord.newSealRight;
  const warnL = document.getElementById('rf-osl-warn');
  const warnR = document.getElementById('rf-osr-warn');
  if(warnL) warnL.textContent = leftMismatch  ? '⚠ MISMATCH' : '';
  if(warnR) warnR.textContent = rightMismatch ? '⚠ MISMATCH' : '';
}

function rfSealOption(field, value) {
  const f = state.refillForm || {};
  const side = field.includes('Left') ? 'Left' : 'Right';
  if(value === 'USE_LAST') {
    const lastRecord = state.refills.filter(r=>r.trainCode===f.trainCode).slice(-1)[0];
    const lastVal = lastRecord ? lastRecord[`newSeal${side}`] : '';
    rfSilent(field, lastVal);
  } else if(value === 'TYPE') {
    rfSilent(field, '');
  } else {
    // NO_SEAL or NO_CAP — set old seal and auto-fill new seal with same value (N/A marker)
    rfSilent(field, value);
    rfSilent(`newSeal${side}`, value);
  }
  rfUpdateSeal();
  render();
}


function rfOpInput(v){
  const code = v.replace(/^EM/i,'');
  rfSilent('operator','EM'+code.toUpperCase());
}

function submitRefill() {
  const f = state.refillForm || {};
  const isSpecial = v => v==='NO_SEAL'||v==='NO_CAP';
  const required = ['date','trainCode','station','fuelType','operator','refillAmt','oldSealLeft','oldSealRight'];
  if(!isSpecial(f.oldSealLeft))  required.push('newSealLeft');
  if(!isSpecial(f.oldSealRight)) required.push('newSealRight');
  const miss = required.filter(k=>!f[k]);
  if(miss.length) { alert('Fill in: '+miss.join(', ')); return; }

  let sealCheck = '';
  const lastRecord = state.refills.filter(r=>r.trainCode===f.trainCode).slice(-1)[0];
  const leftSpecial  = isSpecial(f.oldSealLeft);
  const rightSpecial = isSpecial(f.oldSealRight);

  if(!lastRecord) sealCheck='FIRST FILL';
  else if(leftSpecial||rightSpecial) sealCheck='FAIL';
  else sealCheck=(f.oldSealLeft===lastRecord.newSealLeft&&f.oldSealRight===lastRecord.newSealRight)?'PASS':'FAIL';

  if(sealCheck==='FAIL') {
    notify(`⚠ Seal mismatch recorded — ${f.trainCode} will appear on Dashboard`, 'err');
  }

  const totalAfter = (Number(f.fuelRemaining)||0)+(Number(f.refillAmt)||0);
  const meterDiff = (Number(f.endOdo)||0) - (Number(f.startOdo)||0);
  const meterMismatch = f.startOdo && f.endOdo && f.refillAmt && meterDiff !== Number(f.refillAmt);

  if(meterMismatch) {
    notify(`⚠ Meter mismatch: meter=${fmt(meterDiff)}L, refill=${fmt(Number(f.refillAmt))}L — flagged on Dashboard`, 'err');
  }

  const refillId = genRF();
  const rec = {...f, id:refillId, submittedAt:new Date().toISOString(), totalAfter, sealCheck,
    meterMismatch: meterMismatch || false, meterDiff,
    refillAmt:Number(f.refillAmt), fuelRemaining:Number(f.fuelRemaining),
    startOdo:Number(f.startOdo)||0, endOdo:Number(f.endOdo)||0};
  state.refills.push(rec);

  // Log maintenance flags for NO_SEAL / NO_CAP
  ['Left','Right'].forEach(side => {
    const val = f[`oldSeal${side}`];
    if(val==='NO_SEAL'||val==='NO_CAP') {
      // Check if already has an open flag for this train+side+issue
      const existing = state.maintenanceFlags.find(m=>m.trainCode===f.trainCode&&m.side===side&&m.issue===val&&!m.fixed);
      if(!existing) {
        state.maintenanceFlags.push({
          id: 'MX-'+Date.now()+'-'+side,
          trainCode: f.trainCode,
          issue: val, // 'NO_SEAL' or 'NO_CAP'
          side,
          detectedAt: f.date,
          refillId,
          fixed: false,
          fixedAt: null,
        });
      }
    }
  });

  state.savedRefill = rec;
  state.refillForm = {date:today(),trainCode:'',station:'',fuelType:'',invoiceNo:'',startOdo:'',endOdo:'',operator:'',fuelRemaining:'',refillAmt:'',oldSealLeft:'',oldSealRight:'',newSealLeft:'',newSealRight:''};
  save();
  notify(`Refill saved — ${rec.trainCode} @ ${rec.station} (${fmt(rec.refillAmt)}L)`);
  render();
}

function deleteRefill(idx){
  const r = state.refills[idx];
  if(!r){ notify('Record not found','err'); return; }
  const msg = 'Delete this entry?\n\n' + r.date + '  |  ' + r.trainCode + '  |  ' + r.station + '\nRefill: ' + fmt(r.refillAmt) + ' L  |  Operator: ' + r.operator + '\n\nThis cannot be undone.';
  if(!window.confirm(msg)) return;
  state.refills.splice(idx, 1);
  save();
  notify('Entry deleted');
  render();
}

function editRefill(idx) {
  state.editRefillIdx = idx;
  state.editRefillData = {...state.refills[idx]};
  render();
}

function erSet(k, v) {
  state.editRefillData[k] = v;
}

function saveRefillEdit() {
  const d = state.editRefillData;
  const idx = state.editRefillIdx;
  if(!d.date||!d.trainCode||!d.station||!d.operator||!d.refillAmt) { notify('Fill required fields','err'); return; }

  // Recalculate derived fields
  d.refillAmt = Number(d.refillAmt);
  d.fuelRemaining = Number(d.fuelRemaining)||0;
  d.totalAfter = d.fuelRemaining + d.refillAmt;
  d.startOdo = Number(d.startOdo)||0;
  d.endOdo = Number(d.endOdo)||0;
  const meterDiff = d.endOdo - d.startOdo;
  d.meterDiff = meterDiff;
  d.meterMismatch = d.startOdo && d.endOdo && meterDiff !== d.refillAmt;

  // Recalculate seal check
  const isSpecial = v => v==='NO_SEAL'||v==='NO_CAP';
  const others = state.refills.filter((_,i)=>i!==idx);
  const last = others.filter(r=>r.trainCode===d.trainCode).slice(-1)[0];
  if(!last) d.sealCheck = 'FIRST FILL';
  else if(isSpecial(d.oldSealLeft)||isSpecial(d.oldSealRight)) d.sealCheck = 'FAIL';
  else d.sealCheck = (d.oldSealLeft===last.newSealLeft && d.oldSealRight===last.newSealRight) ? 'PASS' : 'FAIL';

  // Auto-clear new seals if No Seal / No Cap selected
  if(isSpecial(d.oldSealLeft))  { d.newSealLeft  = d.oldSealLeft; }
  if(isSpecial(d.oldSealRight)) { d.newSealRight = d.oldSealRight; }

  // Update maintenance flags — remove old open flags for this refill, re-add if still applicable
  state.maintenanceFlags = state.maintenanceFlags.filter(m=>m.refillId!==d.id);
  ['Left','Right'].forEach(side => {
    const val = d[`oldSeal${side}`];
    if(isSpecial(val)) {
      const existing = state.maintenanceFlags.find(m=>m.trainCode===d.trainCode&&m.side===side&&m.issue===val&&!m.fixed);
      if(!existing) {
        state.maintenanceFlags.push({
          id:'MX-'+Date.now()+'-'+side,
          trainCode:d.trainCode, issue:val, side,
          detectedAt:d.date, refillId:d.id,
          fixed:false, fixedAt:null,
        });
      }
    }
  });

  state.refills[idx] = d;
  state.editRefillIdx = null;
  state.editRefillData = null;
  save();
  notify('Refill record updated — dashboard recalculated');
  render();
}

function cancelRefillEdit() {
  state.editRefillIdx = null;
  state.editRefillData = null;
  render();
}

function updateBeginStock(station, fuelType, val) {
  const k = invKey(station, fuelType);
  if(!state.inventory[k]) state.inventory[k]={beginStock:0,received:0};
  state.inventory[k].beginStock=Number(val);

}

          ${fieldHTML('Requested By *',`<div style="display:flex;align-items:center;gap:0">

function reqSet(k,v){if(!state.reqForm)state.reqForm={station:'',fuelType:'',quantity:'',requestDate:today(),requestedBy:'',notes:''};state.reqForm[k]=v;}
function reqByInput(v){const code=v.replace(/^EM/i,'');reqSet('requestedBy','EM'+code.toUpperCase());}
function submitRequest(){
  const f=state.reqForm||{};
  if(!f.station||!f.fuelType||!f.quantity||!f.requestedBy){alert('Fill all required fields.');return;}
  const o={orderNo:genOrd(),...f,status:'Pending',createdAt:new Date().toISOString()};
  state.orders.push(o);state.savedRequest=true;state.reqForm={station:'',fuelType:'',quantity:'',requestDate:today(),requestedBy:'',notes:''};
  save();notify(`Request submitted — ${o.orderNo}`);setView('orders');
}

        <button onclick="deleteOrder(${idx})" style="background:none;border:1px solid #2a1010;color:#555;padding:3px 9px;border-radius:3px;font-size:10px;cursor:pointer;margin-top:2px" onmouseover="this.style.background='#2a1010';this.style.color='#f87171'" onmouseout="this.style.background='none';this.style.color='#555'">✕ Delete</button>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="section-title">Order Management</div>
    ${state.editOrderIdx != null ? renderOrderEditModal() : ''}
    <div class="tab-bar">
      ${tabs.map(t=>`<button class="tab-btn${tab===t?' active':''}" onclick="state.ordersTab='${t}';render()">${t} <span style="color:#2a2a2a">${counts[t]}</span></button>`).join('')}

}
function approveOrder(orderNo){
  state.orders=state.orders.map(o=>o.orderNo===orderNo?{...o,status:'Approved'}:o);
  save();notify(`Order ${orderNo} approved`);render();
}
function deleteOrder(idx){
  const o=state.orders[idx];
  if(!o){notify('Order not found','err');return;}
  const msg='Delete this order?\n\n'+o.orderNo+'  |  '+o.station+'  |  '+o.fuelType+'\nQty: '+fmt(o.quantity)+' L  |  Status: '+o.status+'\n\nThis cannot be undone.';
  if(!window.confirm(msg)) return;
  // If delivered, reverse the received stock
  if(o.status==='Delivered'&&o.deliveredQty){
    const k=invKey(o.station,o.fuelType);
    if(state.inventory[k]) state.inventory[k].received=Math.max(0,Number(state.inventory[k].received)-Number(o.deliveredQty));
  }
  state.orders.splice(idx,1);
  save();notify('Order deleted');render();
}

function editOrder(idx) {
  state.editOrderIdx = idx;
  state.editOrderData = {...state.orders[idx]};
  render();
}

function eoSet(k, v) {

}

// ── GRN ───────────────────────────────────────────────────────────────────
function renderGRN(){
  const f=state.grnForm||{orderNo:'',deliveredQty:'',deliveredDate:today(),grn:''};
  const approved=state.orders.filter(o=>o.status==='Approved');
  const sel=state.orders.find(o=>o.orderNo===f.orderNo);

  // Variance indicator
  let varianceHTML='';
  if(sel&&f.deliveredQty){
    const ordered=Number(sel.quantity);
    const delivered=Number(f.deliveredQty);
    const diff=delivered-ordered;
    const pct=ordered>0?((Math.abs(diff)/ordered)*100).toFixed(1):0;
    if(diff!==0){
      const color=diff<0?'#f87171':'#4ade80';
      const sign=diff>0?'+':'';
      varianceHTML=`<div style="background:${diff<0?'#1a0000':'#001208'};border:1px solid ${color};border-radius:4px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:11px;color:${color};font-weight:600">⚠ Quantity ${diff<0?'Short':'Over'} — ${sign}${fmt(diff)} L (${sign}${pct}%)</div>
        <div style="font-size:10px;color:#444">Ordered: ${fmt(ordered)} L · Delivered: ${fmt(delivered)} L</div>
      </div>`;
    } else {
      varianceHTML=`<div style="background:#001208;border:1px solid #22c55e;border-radius:4px;padding:10px 14px;font-size:11px;color:#4ade80">✓ Quantity matches order exactly</div>`;
    }
  }

  const preview=sel?`<div style="background:#0d0d0d;border:1px solid #1e1e1e;border-radius:4px;padding:11px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px">
    <div><div class="metric-label">Station</div><div class="metric-val" style="color:#c0c0c0">${sel.station}</div></div>
    <div><div class="metric-label">Fuel Type</div><div class="metric-val" style="color:#c0c0c0">${sel.fuelType}</div></div>
    <div><div class="metric-label">Ordered</div><div class="metric-val big" style="color:#f59e0b">${fmt(sel.quantity)} L</div></div>
  </div>`:'';

  return `
    <div style="max-width:520px">
      <div class="section-title">Goods Received Confirmation</div>
      <div class="card" style="padding:20px;display:grid;gap:15px">
        ${fieldHTML('Approved Order *',`<select onchange="grnSelectOrder(this.value)">
          <option value="">Select order…</option>
          ${approved.map(o=>`<option value="${o.orderNo}"${f.orderNo===o.orderNo?' selected':''}>${o.orderNo} — ${o.station} (${fmt(o.quantity)}L)</option>`).join('')}
        </select>${approved.length===0?'<div style="font-size:10px;color:#444;margin-top:5px">No approved orders.</div>':''}`)}
        ${preview}
        <div class="grid-2">
          ${fieldHTML('Delivered Qty (L) *',`<input type="number" id="grn-qty" min="1" placeholder="Actual litres" value="${f.deliveredQty}" oninput="grnQtyInput(this.value)" onblur="grnQtyBlur(this.value)">`)}
          ${fieldHTML('Delivery Date *',`<input type="date" value="${f.deliveredDate}" onchange="grnDateChange(this.value)">`)}
        </div>
        ${varianceHTML}
        ${fieldHTML('GRN Reference',`<input type="text" id="grn-ref" placeholder="GRN number or note" value="${f.grn}" onblur="grnRefBlur(this.value)">`)}
        <button class="btn-primary" ${approved.length===0?'disabled':''} onclick="submitGRN()">Confirm Delivery &amp; Update Inventory →</button>
      </div>
    </div>`;
}
function grnSelectOrder(v){
  if(!state.grnForm)state.grnForm={orderNo:'',deliveredQty:'',deliveredDate:today(),grn:''};
  state.grnForm.orderNo=v;
  render();
}
function grnQtyInput(v){
  // Update state but DON'T re-render (preserves typing)
  if(!state.grnForm)state.grnForm={orderNo:'',deliveredQty:'',deliveredDate:today(),grn:''};
  state.grnForm.deliveredQty=v;
  // Update variance inline without full re-render
  updateGrnVariance(v);
}
function grnQtyBlur(v){
  if(!state.grnForm)state.grnForm={orderNo:'',deliveredQty:'',deliveredDate:today(),grn:''};
  state.grnForm.deliveredQty=v;
  render();
}
function grnDateChange(v){
  if(!state.grnForm)state.grnForm={orderNo:'',deliveredQty:'',deliveredDate:today(),grn:''};
  state.grnForm.deliveredDate=v;
}
function grnRefBlur(v){
  if(!state.grnForm)state.grnForm={orderNo:'',deliveredQty:'',deliveredDate:today(),grn:''};
  state.grnForm.grn=v;
}
function updateGrnVariance(deliveredVal){
  // Dynamically update variance display without re-rendering
  const f=state.grnForm||{};
  const sel=state.orders.find(o=>o.orderNo===f.orderNo);
  if(!sel||!deliveredVal) return;
  const ordered=Number(sel.quantity);
  const delivered=Number(deliveredVal);
  const diff=delivered-ordered;
  const pct=ordered>0?((Math.abs(diff)/ordered)*100).toFixed(1):0;
  const sign=diff>0?'+':'';
  let html='';
  if(diff!==0){
    const color=diff<0?'#f87171':'#4ade80';
    html=`<div style="background:${diff<0?'#1a0000':'#001208'};border:1px solid ${color};border-radius:4px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
      <div style="font-size:11px;color:${color};font-weight:600">⚠ Quantity ${diff<0?'Short':'Over'} — ${sign}${fmt(diff)} L (${sign}${pct}%)</div>
      <div style="font-size:10px;color:#444">Ordered: ${fmt(ordered)} L · Delivered: ${fmt(delivered)} L</div>
    </div>`;
  } else {
    html=`<div style="background:#001208;border:1px solid #22c55e;border-radius:4px;padding:10px 14px;font-size:11px;color:#4ade80">✓ Quantity matches order exactly</div>`;
  }
  // Insert/update variance div after the grid-2
  const content=document.getElementById('content');
  let vDiv=document.getElementById('grn-variance');
  if(!vDiv){
    vDiv=document.createElement('div');vDiv.id='grn-variance';
    const grnRef=document.getElementById('grn-ref');
    if(grnRef){const refField=grnRef.closest('div[style]')||grnRef.parentElement.parentElement;refField.parentElement.insertBefore(vDiv,refField);}
  }
  if(vDiv)vDiv.innerHTML=html;
}
function submitGRN(){
  const f=state.grnForm||{};
  if(!f.orderNo||!f.deliveredQty){alert('Fill required fields.');return;}
  const order=state.orders.find(o=>o.orderNo===f.orderNo);
  if(!order){notify('Order not found','err');return;}
  if(order.status!=='Approved'){notify('Must be Approved first','err');return;}
  state.orders=state.orders.map(o=>o.orderNo===f.orderNo?{...o,status:'Delivered',deliveredQty:Number(f.deliveredQty),deliveredDate:f.deliveredDate,grn:f.grn}:o);
  const k=invKey(order.station, order.fuelType);
  if(!state.inventory[k])state.inventory[k]={beginStock:0,received:0};
  state.inventory[k].received=Number(state.inventory[k].received)+Number(f.deliveredQty);
  state.grnForm={orderNo:'',deliveredQty:'',deliveredDate:today(),grn:''};
  save();notify(`${f.deliveredQty}L delivered → ${order.station}`);setView('inventory');
}

// ── Trains ────────────────────────────────────────────────────────────────
function renderTrains() {
  const trains = state.trains;
  const rows = trains.map((t,i) => {
    const refillCount = state.refills.filter(r=>r.trainCode===t).length;
    return `<tr>
      <td style="color:#555;font-size:10px;text-align:center;padding:8px 10px">${i+1}</td>
      <td style="color:#f59e0b;font-weight:600;padding:8px 11px">${t}</td>
      <td style="color:#444;text-align:right;padding:8px 11px">${refillCount>0?`<span style="color:#888">${refillCount} refill${refillCount!==1?'s':''}</span>`:'<span style="color:#2a2a2a">—</span>'}</td>
      <td style="padding:8px 11px;text-align:right">
        <button onclick="deleteTrain(${i})" style="background:none;border:1px solid #2a1010;color:#555;padding:3px 9px;border-radius:3px;font-size:10px;cursor:pointer" onmouseover="this.style.background='#2a1010';this.style.color='#f87171'" onmouseout="this.style.background='none';this.style.color='#555'">✕</button>
      </td>
    </tr>`;
  }).join('');

  return `
    <div style="max-width:600px">
      <div class="section-title">Train Register</div>

      <div class="card" style="padding:18px;margin-bottom:18px">
        <div class="field-label" style="margin-bottom:8px">Add New Train</div>
        <div style="display:flex;gap:10px;align-items:center">
          <input type="text" id="new-train-input" placeholder="Train code (e.g. 6999)" style="flex:1" onkeydown="if(event.key==='Enter')addTrain()">
          <button onclick="addTrain()" style="background:#f59e0b;color:#000;border:none;padding:9px 20px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;flex-shrink:0" onmouseover="this.style.background='#fbbf24'" onmouseout="this.style.background='#f59e0b'">+ Add Train</button>
        </div>
      </div>

      <div class="section-title small">${trains.length} Registered Trains</div>
      <div class="card" style="overflow:auto">
        ${trains.length===0?'<div class="empty-state">No trains registered</div>':`
          <table>
            <thead><tr>
              <th style="text-align:center">#</th>
              <th>Train Code</th>
              <th style="text-align:right">Activity</th>
              <th></th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>`}
      </div>
    </div>`;
}

function addTrain() {
  const input = document.getElementById('new-train-input');
  if(!input) return;
  const val = input.value.trim().toUpperCase();
  if(!val) { notify('Enter a train code','err'); return; }
  if(state.trains.includes(val)) { notify(`"${val}" already exists`,'err'); return; }
  state.trains.push(val);
  state.trains.sort((a,b)=>a.localeCompare(b, undefined, {numeric:true}));
  save();
  notify(`Train "${val}" added`);
  render();
}

function deleteTrain(idx) {
  const t = state.trains[idx];
  if(!t) return;
  const usedIn = state.refills.filter(r=>r.trainCode===t).length;
  const msg = usedIn > 0
    ? `Delete "${t}"?\n\nThis train has ${usedIn} refill record${usedIn!==1?'s':''} — those records will remain in the log.\n\nContinue?`
    : `Delete "${t}"?`;
  if(!window.confirm(msg)) return;
  state.trains.splice(idx,1);
  save();
  notify(`Train "${t}" removed`);
  render();
}

// ── Fuel Types ────────────────────────────────────────────────────────────
function renderFuelTypes() {
  const rows = state.fuelTypes.map((f, i) => {
    const usedIn = state.refills.filter(r => r.fuelType === f).length;

function addFuelType() {
  const input = document.getElementById('new-fueltype-input');
  if(!input) return;

  if(!val) { notify('Enter a fuel type name','err'); return; }
  if(state.fuelTypes.some(f=>f.toLowerCase()===val.toLowerCase())) { notify(`"${val}" already exists`,'err'); return; }
  state.fuelTypes.push(val);
  // Reset invFuelTab if it was on a now-removed type (won't happen here but safety)
  if(!state.fuelTypes.includes(state.invFuelTab)) state.invFuelTab = state.fuelTypes[0]||'';
  save();
  notify(`Fuel type "${val}" added`);
  render();
}

function deleteFuelType(idx) {
  const f = state.fuelTypes[idx];
  if(!f) return;
  const refillCount = state.refills.filter(r=>r.fuelType===f).length;
  const orderCount = state.orders.filter(o=>o.fuelType===f).length;
  let msg = `Delete fuel type "${f}"?`;
  if(refillCount||orderCount) msg += `\n\nThis type appears in ${refillCount} refill record${refillCount!==1?'s':''} and ${orderCount} order${orderCount!==1?'s':''}.\nThose records will remain but this type won't appear in dropdowns.\n\nContinue?`;
  if(!window.confirm(msg)) return;
  state.fuelTypes.splice(idx, 1);
  if(state.invFuelTab === f) state.invFuelTab = state.fuelTypes[0]||'';
  save();
  notify(`Fuel type "${f}" removed`);
  render();
}
