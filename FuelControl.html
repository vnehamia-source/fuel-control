function addStation() {
  const nameEl = document.getElementById('new-stn-name');
  const prefixEl = document.getElementById('new-stn-prefix');
  const maxEl = document.getElementById('new-stn-max');
  const name = (nameEl?.value||'').trim();
  const prefix = (prefixEl?.value||'').trim();
  const maxL = Number(maxEl?.value||0);
  if(!name) { notify('Enter a station name','err'); return; }
  if(state.stations.some(s=>s.toLowerCase()===name.toLowerCase())) { notify(`"${name}" already exists`,'err'); return; }
  state.stations.push(name);
  if(prefix) state.invoicePrefixes[name] = prefix;
  if(maxL > 0) state.stationMaxLitres[name] = maxL;
  save();
  notify(`Station "${name}" added`);
  render();
}

function saveStationEdit(idx) {
  const nameEl = document.getElementById('stn-edit-name');
  const prefixEl = document.getElementById('stn-edit-prefix');
  const maxEl = document.getElementById('stn-edit-max');
  const newName = (nameEl?.value||'').trim();
  const newPrefix = (prefixEl?.value||'').trim();
  const newMax = Number(maxEl?.value||0);
  if(!newName) { notify('Station name cannot be empty','err'); return; }
  const oldName = state.stations[idx];
  if(newName !== oldName && state.stations.some((s,i)=>i!==idx&&s.toLowerCase()===newName.toLowerCase())) {
    notify(`"${newName}" already exists`,'err'); return;
  }
  if(newName !== oldName) {
    state.refills.forEach(r=>{ if(r.station===oldName) r.station=newName; });
    state.orders.forEach(o=>{ if(o.station===oldName) o.station=newName; });
    state.fuelTypes.forEach(ft=>{
      const oldKey=invKey(oldName,ft), newKey=invKey(newName,ft);
      if(state.inventory[oldKey]){ state.inventory[newKey]=state.inventory[oldKey]; delete state.inventory[oldKey]; }
    });
    if(state.invoicePrefixes[oldName]) { state.invoicePrefixes[newName]=state.invoicePrefixes[oldName]; delete state.invoicePrefixes[oldName]; }
    if(state.stationMaxLitres[oldName]) { state.stationMaxLitres[newName]=state.stationMaxLitres[oldName]; delete state.stationMaxLitres[oldName]; }
  }
  state.stations[idx] = newName;
  if(newPrefix) state.invoicePrefixes[newName] = newPrefix; else delete state.invoicePrefixes[newName];
  if(newMax > 0) state.stationMaxLitres[newName] = newMax; else delete state.stationMaxLitres[newName];
  state.editStationIdx = null;
  save();
  notify('Station updated');
  render();
}

function deleteStation(idx) {
  const s = state.stations[idx];
  if(!s) return;
  const refillCount = state.refills.filter(r=>r.station===s).length;
  const orderCount = state.orders.filter(o=>o.station===s).length;
  let msg = `Delete station "${s}"?`;
  if(refillCount||orderCount) msg += `\n\nThis station has ${refillCount} refill record${refillCount!==1?'s':''} and ${orderCount} order${orderCount!==1?'s':''}. Those records will remain.\n\nContinue?`;
  if(!window.confirm(msg)) return;
  state.stations.splice(idx,1);
  delete state.invoicePrefixes[s];
  save();
  notify(`Station "${s}" removed`);
  render();
}

// ── Backup / Restore ──────────────────────────────────────────────────────
function saveBackup() {
  const snapshot = {
    _version: 1,
    _savedAt: new Date().toISOString(),
    _label: `FuelControl Backup ${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}`,
    refills: state.refills,
    orders: state.orders,
    inventory: state.inventory,
    trains: state.trains,
    fuelTypes: state.fuelTypes,
    stations: state.stations,
    invoicePrefixes: state.invoicePrefixes,
    stationMaxLitres: state.stationMaxLitres,
    maintenanceFlags: state.maintenanceFlags,
  };
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().split('T')[0];
  a.href = url;
  a.download = `FuelControl_Backup_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  notify(`Backup saved — FuelControl_Backup_${date}.json`);
}

function loadBackup(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data._version || !Array.isArray(data.refills)) {
        notify('Invalid backup file','err'); return;
      }
      const savedAt = new Date(data._savedAt).toLocaleString('en-GB');
      const refillCount = data.refills.length;
      const orderCount = data.orders?.length || 0;
      if(!window.confirm(
        `Load backup?\n\n"${data._label}"\nSaved: ${savedAt}\n\nContains: ${refillCount} refills, ${orderCount} orders\n\n⚠ This will replace ALL current data.\nYour current data will be lost unless you saved a backup first.\n\nContinue?`
      )) { input.value=''; return; }

      if(data.refills) state.refills = data.refills;
      if(data.orders) state.orders = data.orders;
      if(data.inventory) state.inventory = data.inventory;
      if(data.trains) state.trains = data.trains;
      if(data.fuelTypes) state.fuelTypes = data.fuelTypes;
      if(data.stations) state.stations = data.stations;
      if(data.invoicePrefixes) state.invoicePrefixes = data.invoicePrefixes;
      if(data.stationMaxLitres) state.stationMaxLitres = data.stationMaxLitres;
      if(data.maintenanceFlags) state.maintenanceFlags = data.maintenanceFlags;

      save();
      input.value = '';
      notify(`Backup loaded — ${refillCount} refills, ${orderCount} orders restored`);
      setView('dashboard');
    } catch(err) {
      notify('Failed to read backup file','err');
      input.value = '';
    }
  };
  reader.readAsText(file);
}

          <div style="font-size:10px;color:#444;margin-bottom:12px;line-height:1.7">Share with drivers to submit refill records from their phone or PC.</div>
          ${hasRefill
            ? `<div style="background:#111;border:1px solid #1e1e1e;border-radius:4px;padding:8px 10px;font-size:9px;color:#444;word-break:break-all;margin-bottom:10px;font-family:monospace;max-height:48px;overflow:hidden">${escHtml(buildFormUrl('refill'))}</div>
               <div style="display:flex;gap:8px">
                 <button onclick="copyLink('refill')" style="flex:1;background:#1a0808;border:1px solid #ef4444;color:#f87171;padding:8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer">⎘ Copy Link</button>
                 <button onclick="openForm('refill')" style="flex:1;background:#ef4444;color:#fff;border:none;padding:8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer">↗ Preview</button>
               </div>`
            : `<div style="font-size:11px;color:#2a2a2a">Paste the Power Automate URL above to generate a link.</div>`}
        </div>
        <div class="card" style="padding:18px">
          <div style="font-size:12px;font-weight:700;color:#38bdf8;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">📋 Request Form</div>
          <div style="font-size:10px;color:#444;margin-bottom:12px;line-height:1.7">Share with station staff to submit fuel replenishment requests.</div>
          ${hasRequest
            ? `<div style="background:#111;border:1px solid #1e1e1e;border-radius:4px;padding:8px 10px;font-size:9px;color:#444;word-break:break-all;margin-bottom:10px;font-family:monospace;max-height:48px;overflow:hidden">${escHtml(buildFormUrl('request'))}</div>
               <div style="display:flex;gap:8px">
                 <button onclick="copyLink('request')" style="flex:1;background:#001520;border:1px solid #38bdf8;color:#7dd3fc;padding:8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer">⎘ Copy Link</button>
                 <button onclick="openForm('request')" style="flex:1;background:#38bdf8;color:#000;border:none;padding:8px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer">↗ Preview</button>
               </div>`
            : `<div style="font-size:11px;color:#2a2a2a">Paste the Power Automate URL above to generate a link.</div>`}

      <div id="share-status" style="margin-top:4px"></div>

}

function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function copySchema(type) {
  const el = document.getElementById('schema-'+type);
  if(!el) return;
  navigator.clipboard.writeText(el.innerText).then(()=>notify('Schema copied')).catch(()=>prompt('Copy:',el.innerText));
}

function buildFormUrl(type) {
  const cfg = state.shareConfig;
  const webhook = type==='refill' ? cfg.refillWebhook : cfg.requestWebhook;
  const params = new URLSearchParams({
    mode: type,
    webhook,
    stations: JSON.stringify(state.stations),
    fuelTypes: JSON.stringify(state.fuelTypes),
    trains: JSON.stringify(state.trains),
  });
  return location.href.split('?')[0] + '?' + params.toString();
}

function copyLink(type) {
  const url = buildFormUrl(type);
  navigator.clipboard.writeText(url).then(()=>notify('Link copied to clipboard')).catch(()=>prompt('Copy this link:', url));
}

function openForm(type) {
  window.open(buildFormUrl(type), '_blank');
}

// ── Shared Form Mode (opened via link) ───────────────────────────────────
(function checkSharedMode() {
  const params = new URLSearchParams(location.search);
  const mode = params.get('mode');
  if(!mode) return;
  const webhook  = params.get('webhook');
  const stations = JSON.parse(params.get('stations')||'[]');
  const fuelTypes= JSON.parse(params.get('fuelTypes')||'[]');
  const trains   = JSON.parse(params.get('trains')||'[]');

  document.body.innerHTML = buildSharedFormHTML(mode, {webhook, stations, fuelTypes, trains});

  window.submitSharedForm = async function() {
    const btn = document.getElementById('sf-submit');
    btn.disabled = true; btn.textContent = 'Submitting…';
    document.getElementById('sf-msg').innerHTML = '';

    const fields = document.querySelectorAll('[data-field]');
    const data = {};
    fields.forEach(f => data[f.dataset.field] = f.value);

    const required = [...fields].filter(f => f.dataset.required === 'true');
    const missing  = required.filter(f => !f.value.trim());
    if(missing.length) {
      document.getElementById('sf-msg').innerHTML = `<div style="color:#f87171;margin-top:12px;font-size:11px">⚠ Please fill in: ${missing.map(f=>f.dataset.label).join(', ')}</div>`;
      btn.disabled = false; btn.textContent = 'Submit'; return;
    }

    let record;
    if(mode === 'refill') {
      const op = data.operator || '';
      record = { ...data,
        id: 'RF-' + Date.now(),
        submittedAt: new Date().toISOString(),
        operator: op.startsWith('EM') ? op.toUpperCase() : 'EM' + op.toUpperCase(),
        refillAmt: Number(data.refillAmt) || 0,
        fuelRemaining: Number(data.fuelRemaining) || 0,
        startOdo: Number(data.startOdo) || 0,
        endOdo: Number(data.endOdo) || 0,
        totalAfter: (Number(data.fuelRemaining)||0) + (Number(data.refillAmt)||0),
        sealCheck: 'PENDING', meterMismatch: false
      };
    } else {
      const by = data.requestedBy || '';
      record = { ...data,
        orderNo: 'ORD-' + Date.now(),
        status: 'Pending',
        requestedBy: by.startsWith('EM') ? by.toUpperCase() : 'EM' + by.toUpperCase(),
        quantity: Number(data.quantity) || 0,
        submittedAt: new Date().toISOString()
      };
    }

    try {
      const resp = await fetch(webhook, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(record)
      });
      if(!resp.ok && resp.status !== 202) throw new Error('Server responded with ' + resp.status);
      document.getElementById('sf-form').style.display = 'none';
      document.getElementById('sf-success').style.display = 'block';
    } catch(e) {
      document.getElementById('sf-msg').innerHTML = `<div style="color:#f87171;margin-top:12px;font-size:11px">⚠ Submission failed: ${e.message}</div>`;
      btn.disabled = false; btn.textContent = 'Submit';
    }
  };
})();

function buildSharedFormHTML(mode, {webhook, stations, fuelTypes, trains}) {
  const isRefill = mode === 'refill';

  const si = 'background:#0d0d0d;color:#e2e8f0;border:1px solid #222;border-radius:4px;padding:9px 12px;font-family:monospace;font-size:12px;width:100%;outline:none;box-sizing:border-box;';

  const refillFields = `
    <div style="${g2}">
      <div>${lbl('Date',1)}<input data-field="date" data-required="true" data-label="Date" type="date" value="${today}" style="${si}"></div>
      <div>${lbl('Station',1)}<select data-field="station" data-required="true" data-label="Station" style="${si}"><option value="">Select…</option>${stations.map(s=>`<option>${s}</option>`).join('')}</select></div>
    </div>
    <div style="${g2}">
      <div>${lbl('Train Code',1)}<select data-field="trainCode" data-required="true" data-label="Train Code" style="${si}"><option value="">Select…</option>${trains.map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div>${lbl('Fuel Type',1)}<select data-field="fuelType" data-required="true" data-label="Fuel Type" style="${si}"><option value="">Select…</option>${fuelTypes.map(f=>`<option>${f}</option>`).join('')}</select></div>
    </div>
    <div style="${g2}">
      <div>${lbl('Invoice No.')}<input data-field="invoiceNo" type="text" placeholder="Optional" style="${si}"></div>
      <div>${lbl('Operator Code',1)}
        <div style="display:flex">
          <span style="background:#111;border:1px solid #222;border-right:none;border-radius:4px 0 0 4px;padding:9px 10px;font-size:12px;color:#f59e0b;font-weight:700;white-space:nowrap">EM</span>
          <input data-field="operator" data-required="true" data-label="Operator" type="text" placeholder="001" style="${si}border-radius:0 4px 4px 0;border-left:none">
        </div>
      </div>
    </div>
    <div style="${g2}">
      <div>${lbl('Meter Start')}<input data-field="startOdo" type="number" placeholder="Reading" style="${si}"></div>
      <div>${lbl('Meter End')}<input data-field="endOdo" type="number" placeholder="Reading" style="${si}"></div>
    </div>
    <div style="${g2}">
      <div>${lbl('Tank Remaining (L)')}<input data-field="fuelRemaining" type="number" min="0" placeholder="Before refill" style="${si}"></div>
      <div>${lbl('Refill Amount (L)',1)}<input data-field="refillAmt" data-required="true" data-label="Refill Amount" type="number" min="1" placeholder="Litres" style="${si}"></div>
    </div>
    <div style="background:#0a0a0a;border:1px solid #1a1a1a;border-radius:5px;padding:14px;margin-bottom:14px">
      <div style="font-size:10px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Seal Codes</div>
      <div style="${g2}margin-bottom:0">
        <div>${lbl('Old Seal Left',1)}<input data-field="oldSealLeft" data-required="true" data-label="Old Seal Left" type="text" style="${si}"></div>
        <div>${lbl('Old Seal Right',1)}<input data-field="oldSealRight" data-required="true" data-label="Old Seal Right" type="text" style="${si}"></div>
        <div style="margin-top:12px">${lbl('New Seal Left',1)}<input data-field="newSealLeft" data-required="true" data-label="New Seal Left" type="text" style="${si}"></div>
        <div style="margin-top:12px">${lbl('New Seal Right',1)}<input data-field="newSealRight" data-required="true" data-label="New Seal Right" type="text" style="${si}"></div>
      </div>
    </div>`;

  const requestFields = `
    <div style="${g2}">
      <div>${lbl('Station',1)}<select data-field="station" data-required="true" data-label="Station" style="${si}"><option value="">Select…</option>${stations.map(s=>`<option>${s}</option>`).join('')}</select></div>
      <div>${lbl('Fuel Type',1)}<select data-field="fuelType" data-required="true" data-label="Fuel Type" style="${si}"><option value="">Select…</option>${fuelTypes.map(f=>`<option>${f}</option>`).join('')}</select></div>
    </div>
    <div style="${g2}">
      <div>${lbl('Quantity (L)',1)}<input data-field="quantity" data-required="true" data-label="Quantity" type="number" min="1" placeholder="Litres needed" style="${si}"></div>
      <div>${lbl('Request Date',1)}<input data-field="requestDate" data-required="true" data-label="Request Date" type="date" value="${today}" style="${si}"></div>
    </div>
    <div style="margin-bottom:14px">
      ${lbl('Requested By',1)}
      <div style="display:flex">
        <span style="background:#111;border:1px solid #222;border-right:none;border-radius:4px 0 0 4px;padding:9px 10px;font-size:12px;color:#f59e0b;font-weight:700;white-space:nowrap">EM</span>
        <input data-field="requestedBy" data-required="true" data-label="Requested By" type="text" placeholder="Code" style="${si}border-radius:0 4px 4px 0;border-left:none">
      </div>
    </div>
    <div style="margin-bottom:14px">
      ${lbl('Notes')}
      <textarea data-field="notes" rows="3" placeholder="Optional" style="${si}resize:vertical"></textarea>
    </div>`;

  return `<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>${isRefill ? 'Fuel Refill Form' : 'Fuel Request Form'} — FuelControl</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#080808;color:#e2e8f0;font-family:'DM Mono',monospace;min-height:100vh;padding:28px 16px;display:flex;justify-content:center}
    input:focus,select:focus,textarea:focus{outline:none;border-color:${accent} !important;box-shadow:0 0 0 2px ${accent}22}
    select option{background:#0d0d0d}
    button:hover{opacity:.88}
  </style>
  </head><body>
  <div style="width:100%;max-width:540px">
    <div style="margin-bottom:22px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:4px;color:#2a2a2a;text-transform:uppercase">FuelControl</div>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:3px;color:${accent};text-transform:uppercase">${isRefill ? 'Fuel Refill' : 'Fuel Request'}</div>
    </div>
    <div id="sf-form" style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:22px">
      ${isRefill ? refillFields : requestFields}
      <button id="sf-submit" onclick="submitSharedForm()" style="width:100%;background:${accent};color:${isRefill?'#fff':'#000'};border:none;padding:13px;border-radius:5px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer">
        Submit
      </button>
      <div id="sf-msg"></div>
    </div>
    <div id="sf-success" style="display:none;background:#001208;border:1px solid #22c55e;border-radius:8px;padding:40px;text-align:center;margin-top:0">
      <div style="font-size:48px;margin-bottom:14px">✓</div>
      <div style="font-size:18px;font-weight:700;color:#4ade80;font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;margin-bottom:8px">Submitted Successfully</div>
      <div style="font-size:11px;color:#333;line-height:1.8">Your ${isRefill?'refill record':'fuel request'} has been sent to the operations team.<br>You may close this window.</div>
    </div>
  </div>
  </body></html>`;
}



// ── Export ────────────────────────────────────────────────────────────────
function handleExport(){
  if(typeof XLSX==='undefined'){notify('Excel library not loaded','err');return;}
  const wb=XLSX.utils.book_new();
  const cw=headers=>({['!cols']:headers.map(h=>({wch:Math.max(h.length+4,14)}))});

  // Refill Log
  const refillRows=state.refills.map(r=>({'Date':r.date||'','Train Code':r.trainCode||'','Station':r.station||'','Fuel Type':r.fuelType||'','Invoice No.':r.invoiceNo||'','Station Meter Start':r.startOdo||0,'Station Meter End':r.endOdo||0,'Distance (km)':r.endOdo>r.startOdo?r.endOdo-r.startOdo:0,'Operator':r.operator||'','Train Tank Remaining (L)':r.fuelRemaining||0,'Refill Amount (L)':Number(r.refillAmt)||0,'Train Tank Total After':r.totalAfter||0,'Old Seal Left':r.oldSealLeft||'','Old Seal Right':r.oldSealRight||'','New Seal Left':r.newSealLeft||'','New Seal Right':r.newSealRight||'','Seal Check':r.sealCheck||'','L/km':r.endOdo>r.startOdo&&r.refillAmt?(Number(r.refillAmt)/(r.endOdo-r.startOdo)).toFixed(3):''}));
  const wsR=XLSX.utils.json_to_sheet(refillRows.length?refillRows:[{'Date':'No data','Train Code':'','Station':'','Invoice No.':'','Station Meter Start':'','Station Meter End':'','Distance (km)':'','Operator':'','Train Tank Remaining (L)':'','Refill Amount (L)':'','Train Tank Total After':'','Old Seal Left':'','Old Seal Right':'','New Seal Left':'','New Seal Right':'','Seal Check':'','L/km':''}]);
  const rH=['Date','Train Code','Station','Invoice No.','Station Meter Start','Station Meter End','Distance (km)','Operator','Train Tank Remaining (L)','Refill Amount (L)','Train Tank Total After','Old Seal Left','Old Seal Right','New Seal Left','New Seal Right','Seal Check','L/km'];
  wsR['!cols']=rH.map(h=>({wch:Math.max(h.length+4,14)}));
  XLSX.utils.book_append_sheet(wb,wsR,'Refill Log');

  // Inventory
  const invRows=state.stations.flatMap(s=>state.fuelTypes.map(ft=>{const inv=getInv(s,ft);const d=dispensedFor(s,ft);const e=endingStock(s,ft);return{'Station':s,'Fuel Type':ft,'Beginning Stock (L)':Number(inv.beginStock)||0,'Received (L)':Number(inv.received)||0,'Dispensed (L)':d,'Ending Stock (L)':e,'Status':e>5000?'Sufficient':e>1000?'Low':'Critical'};}));
  const wsI=XLSX.utils.json_to_sheet(invRows);wsI['!cols']=['Station','Fuel Type','Beginning Stock (L)','Received (L)','Dispensed (L)','Ending Stock (L)','Status'].map(h=>({wch:Math.max(h.length+4,14)}));
  XLSX.utils.book_append_sheet(wb,wsI,'Inventory');

  // Orders
  const ordRows=state.orders.map(o=>({'Order No':o.orderNo||'','Station':o.station||'','Requested By':o.requestedBy||'','Fuel Type':o.fuelType||'','Requested Qty (L)':o.quantity||0,'Request Date':o.requestDate||'','Status':o.status||'','Delivered Qty (L)':o.deliveredQty||'','Delivery Date':o.deliveredDate||'','GRN Ref':o.grn||'','Notes':o.notes||''}));
  const wsO=XLSX.utils.json_to_sheet(ordRows.length?ordRows:[{'Order No':'No data','Station':'','Fuel Type':'','Requested Qty (L)':'','Request Date':'','Status':'','Delivered Qty (L)':'','Delivery Date':'','GRN Ref':'','Notes':''}]);
  wsO['!cols']=['Order No','Station','Requested By','Fuel Type','Requested Qty (L)','Request Date','Status','Delivered Qty (L)','Delivery Date','GRN Ref','Notes'].map(h=>({wch:Math.max(h.length+4,14)}));
  XLSX.utils.book_append_sheet(wb,wsO,'Orders');

  // Station Summary
  const stnRows=state.stations.map(s=>{const sr=state.refills.filter(r=>r.station===s);const td=sr.reduce((a,r)=>a+Number(r.refillAmt||0),0);const tk=sr.reduce((a,r)=>{const k=r.endOdo>r.startOdo?r.endOdo-r.startOdo:0;return a+k;},0);return{'Station':s,'Total Refills':sr.length,'Total Dispensed (L)':td,'Total Distance (km)':tk,'Avg L/km':tk>0?(td/tk).toFixed(3):'','Seal Failures':sr.filter(r=>r.sealCheck==='FAIL').length,'Ending Stock (L)':endingStockStation(s)};});
  const wsS=XLSX.utils.json_to_sheet(stnRows);wsS['!cols']=['Station','Total Refills','Total Dispensed (L)','Total Distance (km)','Avg L/km','Seal Failures','Ending Stock (L)'].map(h=>({wch:Math.max(h.length+4,14)}));
  XLSX.utils.book_append_sheet(wb,wsS,'Station Summary');

  // Train Summary
  const tmap={};state.refills.forEach(r=>{if(!tmap[r.trainCode])tmap[r.trainCode]={refills:0,dispensed:0,km:0,sealFails:0};tmap[r.trainCode].refills++;tmap[r.trainCode].dispensed+=Number(r.refillAmt||0);if(r.endOdo>r.startOdo)tmap[r.trainCode].km+=r.endOdo-r.startOdo;if(r.sealCheck==='FAIL')tmap[r.trainCode].sealFails++;});
  const tRows=Object.entries(tmap).sort((a,b)=>b[1].dispensed-a[1].dispensed).map(([t,v])=>({'Train Code':t,'Total Refills':v.refills,'Total Dispensed (L)':v.dispensed,'Total Distance (km)':v.km,'Avg L/km':v.km>0?(v.dispensed/v.km).toFixed(3):'','Seal Failures':v.sealFails}));
  const wsT=XLSX.utils.json_to_sheet(tRows.length?tRows:[{'Train Code':'No data','Total Refills':'','Total Dispensed (L)':'','Total Distance (km)':'','Avg L/km':'','Seal Failures':''}]);
  wsT['!cols']=['Train Code','Total Refills','Total Dispensed (L)','Total Distance (km)','Avg L/km','Seal Failures'].map(h=>({wch:Math.max(h.length+4,14)}));
  XLSX.utils.book_append_sheet(wb,wsT,'Train Summary');

  XLSX.writeFile(wb,`FuelControl_Report_${today()}.xlsx`);
  notify('Excel report exported successfully');
}

function markMaintenanceFixed(id) {
  const flag = state.maintenanceFlags.find(m=>m.id===id);
  if(!flag) return;
  flag.fixed = true;
  flag.fixedAt = today();
  save();
  notify(`✓ ${flag.trainCode} ${flag.side} side marked as fixed`);
  render();
}
